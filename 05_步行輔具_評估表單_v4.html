<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>編號05 步行輔具評估表</title>
<style>
:root {
  --brand: #D65A31;
  --brand-light: #fef0eb;
  --brand-dark: #a84520;
  --amber: #E6AF2E;
  --brown: #4B3621;
  --bg: #fafaf8;
  --card: #fff;
  --border: #e2e0d8;
  --text: #2c2c2a;
  --text2: #6b6a65;
  --text3: #9c9a92;
  --success: #1d9e75;
  --radius: 12px;
  --shadow: 0 1px 3px rgba(0,0,0,.06);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, "Noto Sans TC", "Microsoft JhengHei", sans-serif; background:var(--bg); color:var(--text); line-height:1.6; padding-bottom:120px; }

/* Header */
.header { background:var(--brand); color:#fff; padding:16px 20px; position:sticky; top:0; z-index:100; }
.header h1 { font-size:18px; font-weight:600; }
.header .sub { font-size:13px; opacity:.85; margin-top:2px; }

/* Progress */
.progress-bar { height:3px; background:var(--border); position:sticky; top:60px; z-index:99; }
.progress-fill { height:100%; background:var(--brand); transition:width .3s; width:0%; }

/* Sections */
.section { background:var(--card); margin:12px; border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden; border:1px solid var(--border); }
.section-header { padding:14px 16px; background:linear-gradient(135deg, var(--brand-light), #fff); border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; cursor:pointer; user-select:none; }
.section-header .num { background:var(--brand); color:#fff; width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:600; flex-shrink:0; }
.section-header .title { font-size:15px; font-weight:600; color:var(--brown); }
.section-header .chevron { margin-left:auto; font-size:18px; color:var(--text3); transition:transform .2s; }
.section-header.collapsed .chevron { transform:rotate(-90deg); }
.section-body { padding:16px; }
.section-body.hidden { display:none; }

/* Field groups */
.field { margin-bottom:16px; }
.field:last-child { margin-bottom:0; }
.field-label { font-size:13px; font-weight:600; color:var(--text2); margin-bottom:6px; display:block; }
.field-hint { font-size:12px; color:var(--text3); margin-top:2px; }

/* Text inputs */
input[type="text"],  textarea {
  width:100%; padding:10px 12px; border:1px solid var(--border); border-radius:8px;
  font-size:15px; background:#fff; color:var(--text); outline:none; transition:border .2s;
  font-family:inherit;
}
input:focus, textarea:focus { border-color:var(--brand); }
textarea { resize:vertical; min-height:60px; }

/* Checkbox group (multi-select) */
.check-group { display:flex; flex-wrap:wrap; gap:8px; }
.check-item { position:relative; }
.check-item input { position:absolute; opacity:0; width:0; height:0; }
.check-item label {
  display:inline-block; padding:8px 14px; border:1.5px solid var(--border);
  border-radius:20px; font-size:14px; cursor:pointer; transition:all .15s;
  user-select:none; background:#fff; color:var(--text);
}
.check-item input:checked + label {
  background:var(--brand); color:#fff; border-color:var(--brand);
}

/* Radio group (single-select) */
.radio-group { display:flex; flex-direction:column; gap:6px; }
.radio-item { position:relative; }
.radio-item input { position:absolute; opacity:0; width:0; height:0; }
.radio-item label {
  display:block; padding:10px 14px; border:1.5px solid var(--border);
  border-radius:10px; font-size:14px; cursor:pointer; transition:all .15s;
  user-select:none; background:#fff;
}
.radio-item input:checked + label {
  background:var(--brand-light); border-color:var(--brand); color:var(--brand-dark);
  font-weight:500;
}

/* Inline radio (horizontal) */
.radio-inline { display:flex; flex-wrap:wrap; gap:8px; }
.radio-inline .radio-item label { display:inline-block; padding:8px 14px; border-radius:20px; }

/* Side-by-side fields */
.row { display:flex; gap:12px; }
.row .field { flex:1; }

/* Subsection */
.subsection { border-left:3px solid var(--amber); padding-left:14px; margin:16px 0; }
.subsection-title { font-size:14px; font-weight:600; color:var(--brown); margin-bottom:10px; }

/* Conditional blocks */
.conditional { display:none; margin-top:12px; padding:12px; background:var(--brand-light); border-radius:8px; }
.conditional.show { display:block; }

/* Joint assessment grid */
.assess-grid { display:grid; grid-template-columns: auto 1fr 1fr; gap:1px; background:var(--border); border-radius:8px; overflow:hidden; margin-top:8px; }
.assess-grid .cell { padding:8px 10px; background:#fff; font-size:13px; }
.assess-grid .cell-header { background:var(--brand-light); font-weight:600; font-size:12px; color:var(--brown); text-align:center; }
.assess-grid .cell-label { font-weight:500; display:flex; align-items:center; }

/* Bottom action bar */
.action-bar {
  position:fixed; bottom:0; left:0; right:0; padding:12px 16px;
  background:rgba(255,255,255,.95); backdrop-filter:blur(8px);
  border-top:1px solid var(--border); display:flex; gap:10px; z-index:100;
}
.btn { flex:1; padding:12px; border:none; border-radius:10px; font-size:15px; font-weight:600; cursor:pointer; transition:all .15s; font-family:inherit; }
.btn-primary { background:var(--brand); color:#fff; }
.btn-primary:active { background:var(--brand-dark); }
.btn-secondary { background:var(--card); color:var(--text); border:1.5px solid var(--border); }

/* Toast */
.toast { position:fixed; top:80px; left:50%; transform:translateX(-50%); background:var(--success); color:#fff; padding:10px 20px; border-radius:20px; font-size:14px; font-weight:500; opacity:0; transition:opacity .3s; z-index:200; pointer-events:none; }
.toast.show { opacity:1; }

/* Divider */
hr.divider { border:none; border-top:1px dashed var(--border); margin:16px 0; }

/* Dark mode support */
@media (prefers-color-scheme: dark) {
  :root {
    --bg:#1a1a18; --card:#2c2c2a; --border:#444441; --text:#e8e6de;
    --text2:#b4b2a9; --text3:#888780; --brand-light:#3a2218;
  }
  input[type="text"],  textarea { background:#333; color:var(--text); border-color:var(--border); }
  .check-item label, .radio-item label { background:var(--card); color:var(--text); }
  .radio-item input:checked + label { background:var(--brand-light); color:var(--brand); }
  .assess-grid .cell { background:var(--card); }
  .assess-grid .cell-header { background:var(--brand-light); }
}
</style>
</head>
<body>

<div class="header">
  <h1>編號05 步行輔具評估報告書</h1>
  <div class="sub">臺北市西區輔具資源中心</div>
</div>
<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

<div id="toast" class="toast"></div>

<!-- ====== 一、基本資料（自動帶入，可展開編輯） ====== -->
<div class="section">
  <div class="section-header collapsed" onclick="toggleSection(this)">
    <span class="num">1</span><span class="title">基本資料</span>
    <span style="font-size:12px;color:var(--text3);margin-left:8px">由 HTML 自動帶入</span>
    <span class="chevron">▾</span>
  </div>
  <div class="section-body hidden" id="sec1">
    <div class="row">
      <div class="field"><label class="field-label">姓名</label><input type="text" id="f_name"></div>
      <div class="field"><label class="field-label">身分證字號</label><input type="text" id="f_idno"></div>
    </div>
    <div class="field"><label class="field-label">生日</label><input type="text" id="f_birthday" placeholder="民國YYY/MM/DD"></div>
    <div class="row">
      <div class="field"><label class="field-label">聯絡人</label><input type="text" id="f_contact_name"></div>
      <div class="field"><label class="field-label">關係</label><input type="text" id="f_contact_rel"></div>
    </div>
    <div class="field"><label class="field-label">聯絡電話</label><input type="text" id="f_contact_phone"></div>
    <div class="field"><label class="field-label">戶籍地址</label><input type="text" id="f_addr_house"></div>
    <div class="field"><label class="field-label">居住地址</label><input type="text" id="f_addr_live" placeholder="同戶籍地則留空"></div>
    <div class="field"><label class="field-label">聯絡地址</label><input type="text" id="f_addr_mail" placeholder="同戶籍地/同居住地則留空"></div>
    <div class="field">
      <label class="field-label">身障證明</label>
      <div class="radio-inline">
        <div class="radio-item"><input type="radio" name="cert" id="cert_no" value="無"><label for="cert_no">無</label></div>
        <div class="radio-item"><input type="radio" name="cert" id="cert_yes" value="有"><label for="cert_yes">有</label></div>
      </div>
    </div>
    <div class="field">
      <label class="field-label">障礙類別</label>
      <div class="check-group">
        <div class="check-item"><input type="checkbox" id="cat1" value="1"><label for="cat1">第一類</label></div>
        <div class="check-item"><input type="checkbox" id="cat2" value="2"><label for="cat2">第二類</label></div>
        <div class="check-item"><input type="checkbox" id="cat3" value="3"><label for="cat3">第三類</label></div>
        <div class="check-item"><input type="checkbox" id="cat4" value="4"><label for="cat4">第四類</label></div>
        <div class="check-item"><input type="checkbox" id="cat5" value="5"><label for="cat5">第五類</label></div>
        <div class="check-item"><input type="checkbox" id="cat6" value="6"><label for="cat6">第六類</label></div>
        <div class="check-item"><input type="checkbox" id="cat7" value="7"><label for="cat7">第七類</label></div>
        <div class="check-item"><input type="checkbox" id="cat8" value="8"><label for="cat8">第八類</label></div>
      </div>
    </div>
    <div class="field">
      <label class="field-label">程度分級</label>
      <div class="radio-inline">
        <div class="radio-item"><input type="radio" name="severity" value="輕度" id="sev1"><label for="sev1">輕度</label></div>
        <div class="radio-item"><input type="radio" name="severity" value="中度" id="sev2"><label for="sev2">中度</label></div>
        <div class="radio-item"><input type="radio" name="severity" value="重度" id="sev3"><label for="sev3">重度</label></div>
        <div class="radio-item"><input type="radio" name="severity" value="極重度" id="sev4"><label for="sev4">極重度</label></div>
      </div>
    </div>
  </div>
</div>

<!-- ====== 二、活動需求與情境評估 ====== -->
<div class="section">
  <div class="section-header" onclick="toggleSection(this)">
    <span class="num">2</span><span class="title">活動需求與情境</span>
    <span class="chevron">▾</span>
  </div>
  <div class="section-body" id="sec2">
    <div class="field">
      <label class="field-label">1. 預計使用場合（可複選）</label>
      <div class="check-group">
        <div class="check-item"><input type="checkbox" id="place_home" value="居家生活"><label for="place_home">居家生活</label></div>
        <div class="check-item"><input type="checkbox" id="place_inst" value="照顧機構"><label for="place_inst">照顧機構</label></div>
        <div class="check-item"><input type="checkbox" id="place_school" value="校園學習"><label for="place_school">校園學習</label></div>
        <div class="check-item"><input type="checkbox" id="place_work" value="職場就業"><label for="place_work">職場就業</label></div>
        <div class="check-item"><input type="checkbox" id="place_other" value="其他"><label for="place_other">其他</label></div>
      </div>
      <input type="text" id="place_other_text" placeholder="其他說明" style="margin-top:8px;display:none">
    </div>

    <div class="field">
      <label class="field-label">2. 活動需求（可複選）</label>
      <div class="check-group">
        <div class="check-item"><input type="checkbox" id="need_indoor" value="室內步行為主"><label for="need_indoor">室內步行為主</label></div>
        <div class="check-item"><input type="checkbox" id="need_community" value="社區/校園移動"><label for="need_community">社區/校園移動</label></div>
        <div class="check-item"><input type="checkbox" id="need_long" value="中長距離移動(>1km)"><label for="need_long">中長距離(&gt;1km)</label></div>
        <div class="check-item"><input type="checkbox" id="need_sport" value="運動休閒"><label for="need_sport">運動休閒</label></div>
      </div>
      <input type="text" id="need_sport_type" placeholder="運動休閒類型" style="margin-top:8px;display:none">
    </div>

    <div class="field">
      <label class="field-label">3. 使用環境特性（可複選）</label>
      <div class="check-group">
        <div class="check-item"><input type="checkbox" id="env_indoor" value="室內"><label for="env_indoor">室內</label></div>
        <div class="check-item"><input type="checkbox" id="env_outdoor" value="戶外"><label for="env_outdoor">戶外</label></div>
        <div class="check-item"><input type="checkbox" id="env_flat" value="大致平坦"><label for="env_flat">大致平坦</label></div>
        <div class="check-item"><input type="checkbox" id="env_rough" value="顛簸路面"><label for="env_rough">顛簸路面</label></div>
        <div class="check-item"><input type="checkbox" id="env_stair" value="需上下樓梯"><label for="env_stair">上下樓梯</label></div>
        <div class="check-item"><input type="checkbox" id="env_slope" value="需上下斜坡道"><label for="env_slope">斜坡道</label></div>
        <div class="check-item"><input type="checkbox" id="env_thresh" value="需跨越門檻"><label for="env_thresh">跨越門檻</label></div>
        <div class="check-item"><input type="checkbox" id="env_other" value="其他"><label for="env_other">其他</label></div>
      </div>
      <input type="text" id="env_other_text" placeholder="其他環境說明" style="margin-top:8px;display:none">
    </div>

    <div class="field">
      <label class="field-label">4. 人力支持（可複選）</label>
      <div class="check-group">
        <div class="check-item"><input type="checkbox" id="sup_alone" value="獨居"><label for="sup_alone">獨居</label></div>
        <div class="check-item"><input type="checkbox" id="sup_cohabit" value="有同住者"><label for="sup_cohabit">有同住者</label></div>
        <div class="check-item"><input type="checkbox" id="sup_pro" value="有專業人力"><label for="sup_pro">專業人力</label></div>
        <div class="check-item"><input type="checkbox" id="sup_other" value="其他"><label for="sup_other">其他</label></div>
      </div>
      <input type="text" id="sup_pro_text" placeholder="專業人力說明" style="margin-top:8px;display:none">
      <input type="text" id="sup_other_text" placeholder="其他說明" style="margin-top:8px;display:none">
    </div>

    <hr class="divider">
    <div class="subsection">
      <div class="subsection-title">5. 目前使用的輔具（尚未使用免填）</div>
      <div class="field">
        <label class="field-label">輔具種類</label>
        <div class="check-group">
          <div class="check-item"><input type="checkbox" id="cur_cane_std" value="單支拐杖-量產型"><label for="cur_cane_std">單支拐杖-量產型</label></div>
          <div class="check-item"><input type="checkbox" id="cur_cane_cust" value="單支拐杖-客製型"><label for="cur_cane_cust">單支拐杖-客製型</label></div>
          <div class="check-item"><input type="checkbox" id="cur_walker_std" value="助行器-一般型"><label for="cur_walker_std">助行器-一般型</label></div>
          <div class="check-item"><input type="checkbox" id="cur_walker_r" value="助行器-輪管型/R型"><label for="cur_walker_r">輪管型/R型</label></div>
          <div class="check-item"><input type="checkbox" id="cur_rollator" value="帶輪型助步車"><label for="cur_rollator">帶輪型助步車</label></div>
          <div class="check-item"><input type="checkbox" id="cur_posture" value="姿勢控制型助行器"><label for="cur_posture">姿勢控制型</label></div>
          <div class="check-item"><input type="checkbox" id="cur_trunk" value="軀幹支撐型步態訓練器"><label for="cur_trunk">軀幹支撐型</label></div>
          <div class="check-item"><input type="checkbox" id="cur_other" value="其他"><label for="cur_other">其他</label></div>
        </div>
        <input type="text" id="cur_other_text" placeholder="其他輔具說明" style="margin-top:8px;display:none">
      </div>
      <div class="field">
        <label class="field-label">輔具來源</label>
        <div class="check-group">
          <div class="check-item"><input type="checkbox" id="src_disability" value="身障"><label for="src_disability">身障補助</label></div>
          <div class="check-item"><input type="checkbox" id="src_ltc" value="長照"><label for="src_ltc">長照補助</label></div>
          <div class="check-item"><input type="checkbox" id="src_self" value="自購"><label for="src_self">自購</label></div>
          <div class="check-item"><input type="checkbox" id="src_2nd" value="二手輔具"><label for="src_2nd">二手輔具</label></div>
          <div class="check-item"><input type="checkbox" id="src_2nd_rent" value="二手-租借"><label for="src_2nd_rent">租借</label></div>
          <div class="check-item"><input type="checkbox" id="src_2nd_match" value="二手-媒合"><label for="src_2nd_match">媒合</label></div>
          <div class="check-item"><input type="checkbox" id="src_job_injury" value="職災"><label for="src_job_injury">職災</label></div>
          <div class="check-item"><input type="checkbox" id="src_job_rehab" value="職再"><label for="src_job_rehab">職再</label></div>
          <div class="check-item"><input type="checkbox" id="src_edu" value="教育"><label for="src_edu">教育</label></div>
          <div class="check-item"><input type="checkbox" id="src_vet" value="榮民"><label for="src_vet">榮民</label></div>
          <div class="check-item"><input type="checkbox" id="src_nhi" value="健保"><label for="src_nhi">健保</label></div>
          <div class="check-item"><input type="checkbox" id="src_other2" value="其他"><label for="src_other2">其他</label></div>
        </div>
      </div>
      <div class="row">
        <div class="field">
          <label class="field-label">已使用</label>
          <div style="display:flex;gap:8px;align-items:center">
            <input type="text" id="cur_years" placeholder="年" style="flex:1">
            <div class="check-item"><input type="checkbox" id="cur_years_unknown" value="使用年限不明"><label for="cur_years_unknown">年限不明</label></div>
          </div>
        </div>
        <div class="field">
          <label class="field-label">使用情形</label>
          <select id="cur_status" style="width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:#fff;color:var(--text);">
            <option value="">請選擇</option>
            <option value="已損壞不堪修復，需更新">已損壞需更新</option>
            <option value="規格或功能不符使用者現在的需求，需更換">功能不符需更換</option>
            <option value="適合繼續使用，但需要另行購置於不同場所使用">繼續使用另購</option>
            <option value="其他">其他</option>
          </select>
          <input type="text" id="cur_status_other" placeholder="其他使用情形說明" style="margin-top:8px;display:none">
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ====== 三、身體功能與構造 ====== -->
<div class="section">
  <div class="section-header" onclick="toggleSection(this)">
    <span class="num">3</span><span class="title">身體功能評估</span>
    <span class="chevron">▾</span>
  </div>
  <div class="section-body" id="sec3">
    <div class="field">
      <label class="field-label">相關診斷（可複選）</label>
      <div class="check-group">
        <div class="check-item"><input type="checkbox" id="dx_dementia" value="失智症"><label for="dx_dementia">失智症</label></div>
        <div class="check-item"><input type="checkbox" id="dx_stroke" value="中風偏癱"><label for="dx_stroke">中風偏癱</label></div>
        <div class="check-item"><input type="checkbox" id="dx_sci" value="脊髓損傷"><label for="dx_sci">脊髓損傷</label></div>
        <div class="check-item"><input type="checkbox" id="dx_tbi" value="腦外傷"><label for="dx_tbi">腦外傷</label></div>
        <div class="check-item"><input type="checkbox" id="dx_cerebellar" value="小腦萎縮症"><label for="dx_cerebellar">小腦萎縮</label></div>
        <div class="check-item"><input type="checkbox" id="dx_cp" value="腦性麻痺"><label for="dx_cp">腦性麻痺</label></div>
        <div class="check-item"><input type="checkbox" id="dx_delay" value="發展遲緩"><label for="dx_delay">發展遲緩</label></div>
        <div class="check-item"><input type="checkbox" id="dx_mnd" value="運動神經元疾病"><label for="dx_mnd">運動神經元</label></div>
        <div class="check-item"><input type="checkbox" id="dx_parkinson" value="巴金森氏症"><label for="dx_parkinson">巴金森氏症</label></div>
        <div class="check-item"><input type="checkbox" id="dx_muscular" value="肌肉萎縮症"><label for="dx_muscular">肌肉萎縮</label></div>

// Progress bar
function updateProgress() {
  const all = document.querySelectorAll('input[type="radio"]:checked, input[type="checkbox"]:checked');
  const textFilled = Array.from(document.querySelectorAll('input[type="text"],  textarea')).filter(el => el.value.trim()).length;
  const total = document.querySelectorAll('input[type="radio"], input[type="checkbox"]').length / 3 + 20;
  const pct = Math.min(100, Math.round((all.length + textFilled) / total * 100));
  document.getElementById('progressFill').style.width = pct + '%';
}
document.addEventListener('change', updateProgress);
document.addEventListener('input', updateProgress);

// Collect all form data
function collectData() {
  const data = {};
  // Text inputs
  document.querySelectorAll('input[type="text"],  textarea').forEach(el => {
    if (el.id && el.value.trim()) data[el.id] = el.value.trim();
  });
  // Selects
  document.querySelectorAll('select').forEach(el => {
    if (el.id && el.value) data[el.id] = el.value;
  });
  // Radio
  document.querySelectorAll('input[type="radio"]:checked').forEach(el => {
    data[el.name] = el.value;
  });
  // Checkboxes (grouped by similar prefix)
  const checks = {};
  document.querySelectorAll('input[type="checkbox"]:checked').forEach(el => {
    if (!checks[el.name || el.id]) checks[el.name || el.id] = [];
    checks[el.name || el.id].push(el.value);
  });
  data._checks = checks;
  data._timestamp = new Date().toISOString();
  data._report = '編號05-步行輔具';
  return data;
}

// Save to localStorage
function saveLocal() {
  const data = collectData();
  const key = 'form05_' + (data.f_name || 'draft');
  localStorage.setItem(key, JSON.stringify(data));
  showToast('已暫存至本機');
}

// Export JSON - try download first, fallback to copy
function exportJSON() {
  const data = collectData();
  const json = JSON.stringify(data, null, 2);
  
  // Try download (works on desktop and some mobile browsers)
  try {
    const blob = new Blob([json], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `05_步行輔具_${data.f_name || '草稿'}_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  } catch(e) {}
  
  // Also copy to clipboard as backup
  copyJSON();
}

// Copy JSON to clipboard
function copyJSON() {
  const data = collectData();
  const json = JSON.stringify(data, null, 2);
  showCopyModal(json);
}

function fallbackCopy(text) {
  // Fallback for iOS Safari file:// protocol
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;left:-9999px;top:0';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try {
    document.execCommand('copy');
    showToast('已複製到剪貼簿');
  } catch(e) {
    // Last resort: show in a modal for manual copy
    showCopyModal(text);
  }
  document.body.removeChild(ta);
}

function showCopyModal(text) {
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px';
  const box = document.createElement('div');
  box.style.cssText = 'background:#fff;border-radius:12px;padding:16px;width:100%;max-height:70vh;display:flex;flex-direction:column;gap:12px';
  box.innerHTML = `<div style="font-weight:600;font-size:15px">長按下方文字全選→複製</div>
    <textarea readonly style="flex:1;min-height:200px;font-size:12px;font-family:monospace;border:1px solid #ddd;border-radius:8px;padding:8px">${text.split('<').join('&lt;')}</textarea>
    <button onclick="this.closest('div[style*=fixed]').remove()" style="padding:10px;background:var(--brand);color:#fff;border:none;border-radius:8px;font-size:15px">關閉</button>`;
  overlay.appendChild(box);
  document.body.appendChild(overlay);
  box.querySelector('textarea').focus();
  box.querySelector('textarea').select();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// Auto-load from localStorage on open
window.addEventListener('load', function(){
  updateProgress();
  // Set today's date
  if (!document.getElementById('f_eval_date').value) {
    const d = new Date();
    document.getElementById('f_eval_date').value = d.getFullYear() + '/' + String(d.getMonth()+1).padStart(2,'0') + '/' + String(d.getDate()).padStart(2,'0');
  }
});
</script>
</body>
