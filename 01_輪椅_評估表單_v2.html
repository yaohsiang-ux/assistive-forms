<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>編號01 輪椅評估表</title>
<style>
:root{--brand:#D65A31;--brand-light:#fef0eb;--brand-dark:#a84520;--amber:#E6AF2E;--brown:#4B3621;--bg:#fafaf8;--card:#fff;--border:#e2e0d8;--text:#2c2c2a;--text2:#6b6a65;--text3:#9c9a92;--success:#1d9e75;--radius:12px;--shadow:0 1px 3px rgba(0,0,0,.06)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"Noto Sans TC","Microsoft JhengHei",sans-serif;background:var(--bg);color:var(--text);line-height:1.6;padding-bottom:120px}
.header{background:var(--brand);color:#fff;padding:16px 20px;position:sticky;top:0;z-index:100}
.header h1{font-size:18px;font-weight:600}.header .sub{font-size:13px;opacity:.85;margin-top:2px}
.progress-bar{height:3px;background:var(--border);position:sticky;top:60px;z-index:99}
.progress-fill{height:100%;background:var(--brand);transition:width .3s;width:0%}
.section{background:var(--card);margin:12px;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;border:1px solid var(--border)}
.section-header{padding:14px 16px;background:linear-gradient(135deg,var(--brand-light),#fff);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none}
.section-header .num{background:var(--brand);color:#fff;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0}
.section-header .title{font-size:15px;font-weight:600;color:var(--brown)}
.section-header .chevron{margin-left:auto;font-size:18px;color:var(--text3);transition:transform .2s}
.section-header.collapsed .chevron{transform:rotate(-90deg)}
.section-body{padding:16px}.section-body.hidden{display:none}
.field{margin-bottom:16px}.field:last-child{margin-bottom:0}
.field-label{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:6px;display:block}
.field-hint{font-size:12px;color:var(--text3);margin-top:2px}
input[type="text"],textarea,select{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:15px;background:var(--card);color:var(--text);-webkit-appearance:none}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(214,90,49,.12)}
textarea{resize:vertical}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.check-grid{display:flex;flex-wrap:wrap;gap:8px}
.check-item input{display:none}.check-item label{display:block;padding:8px 14px;border:1px solid var(--border);border-radius:8px;font-size:14px;cursor:pointer;transition:.15s}
.check-item input:checked+label{background:var(--brand);color:#fff;border-color:var(--brand)}
.radio-inline{display:flex;flex-wrap:wrap;gap:8px}
.radio-item input{display:none}.radio-item label{display:block;padding:8px 14px;border:1px solid var(--border);border-radius:8px;font-size:14px;cursor:pointer;transition:.15s}
.radio-item input:checked+label{background:var(--brand);color:#fff;border-color:var(--brand)}
.divider{border:none;border-top:1px solid var(--border);margin:16px 0}
.sub-label{font-size:14px;font-weight:600;color:var(--brown);margin:16px 0 8px;padding-bottom:4px;border-bottom:2px solid var(--amber)}
.action-bar{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);padding:12px 16px;display:flex;gap:10px;z-index:100}
.btn{flex:1;padding:12px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer}
.btn-primary{background:var(--brand);color:#fff}.btn-secondary{background:var(--bg);color:var(--text);border:1px solid var(--border)}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:#333;color:#fff;padding:10px 20px;border-radius:10px;font-size:14px;opacity:0;transition:.3s;pointer-events:none;z-index:200}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.conditional{display:none}.conditional.show{display:block}
</style>
</head>
<body>

<div class="header">
  <h1>編號01 輪椅評估表</h1>
  <div class="sub">推車、輪椅、輪椅附加功能及配件</div>
</div>
<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
<div id="toast" class="toast"></div>

<!-- ==================== Section 1: 活動需求 ==================== -->
<div class="section">
  <div class="section-header" onclick="toggleSection(this)">
    <div class="num">1</div><div class="title">活動需求與情境</div><div class="chevron">›</div>
  </div>
  <div class="section-body">

    <div class="field"><label class="field-label">預計使用場合（可複選）</label>
      <div class="check-grid">
        <div class="check-item"><input type="checkbox" name="place_home" id="pl_h" value="居家生活"><label for="pl_h">居家生活</label></div>
        <div class="check-item"><input type="checkbox" name="place_inst" id="pl_i" value="照顧機構"><label for="pl_i">照顧機構</label></div>
        <div class="check-item"><input type="checkbox" name="place_school" id="pl_s" value="校園學習"><label for="pl_s">校園學習</label></div>
        <div class="check-item"><input type="checkbox" name="place_work" id="pl_w" value="職場就業"><label for="pl_w">職場就業</label></div>
      </div>
      <div class="field" style="margin-top:8px"><input type="text" id="place_other" placeholder="其他場合"></div>
    </div>

    <div class="field"><label class="field-label">活動需求（可複選）</label>
      <div class="check-grid">
        <div class="check-item"><input type="checkbox" name="need_static" id="nd_st" value="室內靜態活動為主"><label for="nd_st">室內靜態活動為主</label></div>
        <div class="check-item"><input type="checkbox" name="need_short" id="nd_sh" value="短距離移動"><label for="nd_sh">社區/校園短距離移動</label></div>
        <div class="check-item"><input type="checkbox" name="need_long" id="nd_lg" value="中長距離移動"><label for="nd_lg">中長距離移動(>1km)</label></div>
        <div class="check-item"><input type="checkbox" name="need_sport" id="nd_sp" value="運動休閒"><label for="nd_sp">運動休閒</label></div>
      </div>
      <div class="row" style="margin-top:8px">
        <div class="field"><input type="text" id="need_short_freq" placeholder="短距離頻率"></div>
        <div class="field"><input type="text" id="need_long_freq" placeholder="長距離頻率"></div>
      </div>
      <div class="field"><input type="text" id="need_sport_type" placeholder="運動休閒類型"></div>
    </div>

    <div class="field"><label class="field-label">使用環境特性（可複選）</label>
      <div class="check-grid">
        <div class="check-item"><input type="checkbox" name="env_flat" id="env_f" value="大致平坦"><label for="env_f">大致平坦</label></div>
        <div class="check-item"><input type="checkbox" name="env_rough" id="env_r" value="經常通過顛簸路面"><label for="env_r">顛簸路面</label></div>
        <div class="check-item"><input type="checkbox" name="env_thresh" id="env_t" value="需跨越門檻"><label for="env_t">跨越門檻/線槽</label></div>
        <div class="check-item"><input type="checkbox" name="env_gap" id="env_g" value="經常需跨越間隙"><label for="env_g">跨越間隙</label></div>
        <div class="check-item"><input type="checkbox" name="env_ramp" id="env_rm" value="需在無障礙坡道推行"><label for="env_rm">無障礙坡道</label></div>
        <div class="check-item"><input type="checkbox" name="env_steep" id="env_st" value="需在陡坡推行"><label for="env_st">陡坡推行</label></div>
      </div>
      <div class="row" style="margin-top:8px">
        <div class="field"><input type="text" id="env_thresh_h" placeholder="門檻高低差(cm)"></div>
        <div class="field"><input type="text" id="env_gap_d" placeholder="間隙距離(cm)"></div>
      </div>
    </div>

    <div class="field"><label class="field-label">人力支持情況</label>
      <div class="radio-inline">
        <div class="radio-item"><input type="radio" name="support" value="無" id="sup_n"><label for="sup_n">無</label></div>
        <div class="radio-item"><input type="radio" name="support" value="偶有協助人力" id="sup_o"><label for="sup_o">偶有協助</label></div>
        <div class="radio-item"><input type="radio" name="support" value="經常有照顧者陪同" id="sup_c"><label for="sup_c">經常有照顧者</label></div>
      </div>
      <div class="field" style="margin-top:8px"><input type="text" id="support_other" placeholder="其他"></div>
    </div>

    <div class="field"><label class="field-label">交通運輸方式（可複選）</label>
      <div class="check-grid">
        <div class="check-item"><input type="checkbox" name="trans_none" id="tr_n" value="無"><label for="tr_n">無</label></div>
        <div class="check-item"><input type="checkbox" name="trans_bus" id="tr_b" value="公車/復康巴士"><label for="tr_b">公車/復康巴士</label></div>
        <div class="check-item"><input type="checkbox" name="trans_car" id="tr_c" value="需小客車載運"><label for="tr_c">小客車載運</label></div>
        <div class="check-item"><input type="checkbox" name="trans_moto" id="tr_m" value="自駕改裝機車"><label for="tr_m">自駕改裝機車</label></div>
      </div>
    </div>

  </div>
</div>

<!-- ==================== Section 2: 目前輔具 ==================== -->
<div class="section">
  <div class="section-header collapsed" onclick="toggleSection(this)">
    <div class="num">2</div><div class="title">目前使用的輔具</div><div class="chevron">›</div>
  </div>
  <div class="section-body hidden">

    <div class="field"><label class="field-label">輔具種類</label>
      <div class="sub-label">推車</div>
      <div class="check-grid">
        <div class="check-item"><input type="checkbox" name="cur_buggy_std" id="cb_s" value="一般型"><label for="cb_s">一般型</label></div>
        <div class="check-item"><input type="checkbox" name="cur_buggy_hd" id="cb_h" value="荷重型"><label for="cb_h">荷重型</label></div>
        <div class="check-item"><input type="checkbox" name="cur_buggy_pos" id="cb_p" value="擺位型"><label for="cb_p">擺位型</label></div>
      </div>
      <div class="sub-label">輪椅</div>
      <div class="check-grid">
        <div class="check-item"><input type="checkbox" name="cur_wc_std" id="cw_s" value="非輕量化量產型"><label for="cw_s">非輕量化量產型</label></div>
        <div class="check-item"><input type="checkbox" name="cur_wc_light" id="cw_l" value="輕量化量產型"><label for="cw_l">輕量化量產型</label></div>
        <div class="check-item"><input type="checkbox" name="cur_wc_custom" id="cw_c" value="客製型"><label for="cw_c">客製型</label></div>
        <div class="check-item"><input type="checkbox" name="cur_wc_power" id="cw_p" value="手推圈啟動型"><label for="cw_p">手推圈啟動型動力輔助</label></div>
      </div>
      <div class="sub-label">輪椅附加功能（可複選）</div>
      <div class="check-grid">
        <div class="check-item"><input type="checkbox" name="cur_af_transfer" id="ca_t" value="利於移位"><label for="ca_t">利於移位</label></div>
        <div class="check-item"><input type="checkbox" name="cur_af_recline" id="ca_r" value="仰躺"><label for="ca_r">仰躺</label></div>
        <div class="check-item"><input type="checkbox" name="cur_af_tilt" id="ca_ti" value="空中傾倒"><label for="ca_ti">空中傾倒</label></div>
      </div>
      <div class="sub-label">高活動型輪椅</div>
      <div class="check-grid">
        <div class="check-item"><input type="checkbox" name="cur_ha_basic" id="ch_b" value="基礎型"><label for="ch_b">基礎型</label></div>
        <div class="check-item"><input type="checkbox" name="cur_ha_adv" id="ch_a" value="進階型"><label for="ch_a">進階型</label></div>
      </div>
      <div class="sub-label">輪椅配件-動力套件</div>
      <div class="check-grid">
        <div class="check-item"><input type="checkbox" name="cur_pk_rear" id="cp_r" value="後推式介護型"><label for="cp_r">後推式介護型</label></div>
        <div class="check-item"><input type="checkbox" name="cur_pk_self" id="cp_s" value="後推式自駕型"><label for="cp_s">後推式自駕型</label></div>
        <div class="check-item"><input type="checkbox" name="cur_pk_front" id="cp_f" value="前拉式自駕型"><label for="cp_f">前拉式自駕型</label></div>
      </div>
    </div>

    <hr class="divider">
    <div class="field"><label class="field-label">輔具來源</label>
      <div class="radio-inline">
        <div class="radio-item"><input type="radio" name="cur_source" value="政府補助" id="sr_gov"><label for="sr_gov">政府補助</label></div>
        <div class="radio-item"><input type="radio" name="cur_source" value="二手輔具" id="sr_2nd"><label for="sr_2nd">二手輔具</label></div>
        <div class="radio-item"><input type="radio" name="cur_source" value="自購" id="sr_self"><label for="sr_self">自購</label></div>
        <div class="radio-item"><input type="radio" name="cur_source" value="其他" id="sr_oth"><label for="sr_oth">其他</label></div>
      </div>
      <div id="srcDetail" class="conditional">
        <div class="field" style="margin-top:8px"><label class="field-label">政府補助類型（可複選）</label>
          <div class="check-grid">
            <div class="check-item"><input type="checkbox" name="src_disability" id="sr_d" value="身障"><label for="sr_d">身障</label></div>
            <div class="check-item"><input type="checkbox" name="src_ltc" id="sr_l" value="長照"><label for="sr_l">長照</label></div>
            <div class="check-item"><input type="checkbox" name="src_work" id="sr_w" value="職災"><label for="sr_w">職災</label></div>
            <div class="check-item"><input type="checkbox" name="src_rehab" id="sr_r" value="職再"><label for="sr_r">職再</label></div>
            <div class="check-item"><input type="checkbox" name="src_edu" id="sr_e" value="教育"><label for="sr_e">教育</label></div>
            <div class="check-item"><input type="checkbox" name="src_vet" id="sr_v" value="榮民"><label for="sr_v">榮民</label></div>
            <div class="check-item"><input type="checkbox" name="src_nhi" id="sr_n" value="健保"><label for="sr_n">健保</label></div>
          </div>
          <div class="field" style="margin-top:8px"><input type="text" id="src_gov_other" placeholder="其他補助來源"></div>
        </div>
        <div class="field"><label class="field-label">二手輔具方式</label>
          <div class="radio-inline">
            <div class="radio-item"><input type="radio" name="src_2nd_type" value="租借" id="s2_a"><label for="s2_a">租借</label></div>
            <div class="radio-item"><input type="radio" name="src_2nd_type" value="媒合" id="s2_b"><label for="s2_b">媒合</label></div>
          </div>
        </div>
        <div class="field"><input type="text" id="src_other_text" placeholder="其他來源說明"></div>
      </div>
    </div>

    <div class="row">
      <div class="field"><label class="field-label">已使用約（年）</label><input type="text" inputmode="decimal" id="cur_years" placeholder="年"></div>
      <div class="field"><label class="field-label">使用年限</label>
        <div class="check-grid"><div class="check-item"><input type="checkbox" name="cur_years_unknown" id="yr_u" value="不明"><label for="yr_u">使用年限不明</label></div></div>
      </div>
    </div>

    <div class="field"><label class="field-label">使用情形</label>
      <div class="radio-inline">
        <div class="radio-item"><input type="radio" name="cur_status" value="已損壞不堪修復，需更新" id="cs_1"><label for="cs_1">損壞需更新</label></div>
        <div class="radio-item"><input type="radio" name="cur_status" value="規格或功能不符使用者現在的需求，需更換" id="cs_2"><label for="cs_2">規格不符需更換</label></div>
        <div class="radio-item"><input type="radio" name="cur_status" value="適合繼續使用，但需要另行購置於不同場所使用" id="cs_3"><label for="cs_3">另購於不同場所</label></div>
      </div>
      <div class="field" style="margin-top:8px"><input type="text" id="cur_status_other" placeholder="其他"></div>
    </div>

  </div>
</div>

<!-- ==================== Section 3: 身體評估 ==================== -->
<div class="section">
  <div class="section-header collapsed" onclick="toggleSection(this)">
    <div class="num">3</div><div class="title">身體功能評估</div><div class="chevron">›</div>
  </div>
  <div class="section-body hidden">

    <div class="sub-label">診斷（可複選）</div>
    <div class="check-grid" id="dxGrid"></div>
    <div class="row" style="margin-top:8px">
      <div class="field"><input type="text" id="dx_stroke_side" placeholder="中風偏癱側(左/右)"></div>
      <div class="field"><input type="text" id="dx_sci_level" placeholder="脊髓損傷位(頸/胸/腰/薦)"></div>
    </div>
    <div class="field"><input type="text" id="dx_tbi_side" placeholder="腦外傷(左/右)"></div>
    <div class="field"><input type="text" id="dx_other_text" placeholder="其他診斷"></div>

    <hr class="divider">
    <div class="sub-label">身體尺寸</div>
    <div class="row3">
      <div class="field"><label class="field-label">身高(cm)</label><input type="text" inputmode="decimal" id="f_height"></div>
      <div class="field"><label class="field-label">體重(kg)</label><input type="text" inputmode="decimal" id="f_weight"></div>
      <div class="field"><label class="field-label">體型概述</label><input type="text" id="body_desc"></div>
    </div>

    <div class="sub-label">管路/造口（可複選）</div>
    <div class="check-grid" id="tubeGrid"></div>

    <hr class="divider">
    <div class="sub-label">身體各部位姿態</div>

    <div class="field"><label class="field-label">靜態坐姿維持能力</label>
      <div class="radio-inline">
        <div class="radio-item"><input type="radio" name="sit_bal" value="良好" id="sb_1"><label for="sb_1">良好</label></div>
        <div class="radio-item"><input type="radio" name="sit_bal" value="雙手扶持尚可維持平衡" id="sb_2"><label for="sb_2">雙手扶持尚可</label></div>
        <div class="radio-item"><input type="radio" name="sit_bal" value="雙手扶持難以維持平衡" id="sb_3"><label for="sb_3">雙手扶持難以</label></div>
      </div>
      <div class="field" style="margin-top:8px"><label class="field-label">身體明顯會倒向（可複選）</label>
        <div class="check-grid">
          <div class="check-item"><input type="checkbox" name="fall_l" id="fl_l" value="左側"><label for="fl_l">左側</label></div>
          <div class="check-item"><input type="checkbox" name="fall_r" id="fl_r" value="右側"><label for="fl_r">右側</label></div>
          <div class="check-item"><input type="checkbox" name="fall_f" id="fl_f" value="前方"><label for="fl_f">前方</label></div>
          <div class="check-item"><input type="checkbox" name="fall_b" id="fl_b" value="後方"><label for="fl_b">後方</label></div>
        </div>
      </div>
    </div>

    <div class="field"><label class="field-label">輪椅移動時坐姿維持能力</label>
      <div class="radio-inline">
        <div class="radio-item"><input type="radio" name="move_bal" value="良好" id="mb_1"><label for="mb_1">良好</label></div>
        <div class="radio-item"><input type="radio" name="move_bal" value="尚可維持平衡" id="mb_2"><label for="mb_2">尚可維持</label></div>
        <div class="radio-item"><input type="radio" name="move_bal" value="需以輔具加強軀幹支撐" id="mb_3"><label for="mb_3">需輔具加強</label></div>
      </div>
    </div>

    <div class="field"><label class="field-label">骨盆（可複選）</label>
      <div class="check-grid" id="pelvisGrid"></div>
    </div>

    <div class="field"><label class="field-label">脊柱（可複選）</label>
      <div class="check-grid">
        <div class="check-item"><input type="checkbox" name="spine_normal" id="sp_n" value="無明顯變形"><label for="sp_n">無明顯變形</label></div>
        <div class="check-item"><input type="checkbox" name="spine_scol" id="sp_s" value="脊柱側彎"><label for="sp_s">脊柱側彎</label></div>
        <div class="check-item"><input type="checkbox" name="spine_lordosis" id="sp_l" value="過度前凸"><label for="sp_l">過度前凸</label></div>
        <div class="check-item"><input type="checkbox" name="spine_kyphosis" id="sp_k" value="過度後凸"><label for="sp_k">過度後凸</label></div>
      </div>
    </div>

    <div class="field"><label class="field-label">頭部控制</label>
      <div class="radio-inline">
        <div class="radio-item"><input type="radio" name="head_ctrl" value="正常" id="hc_1"><label for="hc_1">正常</label></div>
        <div class="radio-item"><input type="radio" name="head_ctrl" value="控制不佳" id="hc_2"><label for="hc_2">偶可維持但不佳</label></div>

(function(){
  const skills = [

    ['skill_ramp','3. 無障礙坡道上自推上坡、轉向及停止'],

    ['skill_narrow','5. 於較窄的通道中穩定向前推行5公尺'],
    ['skill_transfer','6. 進出小轎車或馬桶、床鋪間的轉位'],
    ['skill_curb','7. 上下5公分的台階或門檻'],
    ['skill_wheelie','8. 前輪翹起技巧(Wheelie)'],
    ['skill_relieve','9. 執行座面減壓方式']
  ];
  const opts_default = ['獨立完成','可訓練或需改裝','需要他人協助'];
  const opts_assist = ['獨立完成','可訓練或使用輔具','需要他人協助'];
  const opts_relieve = ['獨立將身體撐起','獨立以重心偏移','需要他人協助'];
  const c = document.getElementById('skillsCont');
  skills.forEach(([id,label]) => {
    let opts = opts_default;
    if(id === 'skill_transfer' || id === 'skill_curb') opts = opts_assist;
    if(id === 'skill_relieve') opts = opts_relieve;
    c.innerHTML += `<div class="field"><label class="field-label">${label}</label><div class="radio-inline">${
      opts.map((o,i) => `<div class="radio-item"><input type="radio" name="${id}" value="${o}" id="${id}_${i}"><label for="${id}_${i}">${o}</label></div>`).join('')
    }</div></div>`;
  });
})();

// Exempt detail toggle

}));

  const block = document.getElementById('soreDetailBlock');
  if(block) block.classList.toggle('show', this.value !== '未曾發生');
}));

// Progress bar
function updateProgress(){
  const checked = document.querySelectorAll('input[type="radio"]:checked, input[type="checkbox"]:checked').length;
  const filled = Array.from(document.querySelectorAll('input[type="text"],  textarea')).filter(el => el.value.trim()).length;
  const total = 60;
  const pct = Math.min(100, Math.round((checked + filled) / total * 100));
  document.getElementById('progressFill').style.width = pct + '%';
}
document.addEventListener('change', updateProgress);
document.addEventListener('input', updateProgress);

function collectData(){
  const data = {};
  document.querySelectorAll('input[type="text"],  textarea').forEach(el => {
    if (el.id && el.value.trim()) data[el.id] = el.value.trim();
  });
  document.querySelectorAll('input[type="radio"]:checked').forEach(el => { data[el.name] = el.value; });
  const checks = {};
  document.querySelectorAll('input[type="checkbox"]:checked').forEach(el => {
    const key = el.name || el.id;
    if (!checks[key]) checks[key] = [];
    checks[key].push(el.value);
  });
  data._checks = checks;
  data._timestamp = new Date().toISOString();
  data._report = '編號01-輪椅';
  return data;
}

function saveLocal(){
  localStorage.setItem('form01_draft', JSON.stringify(collectData()));
  showToast('已暫存至本機');
}

function exportJSON(){
  const data = collectData();
  const json = JSON.stringify(data, null, 2);
  try{
    const blob = new Blob([json],{type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `01_輪椅_${data.f_evaluator||'草稿'}_${new Date().toISOString().slice(0,10)}.json`;
    a.click(); URL.revokeObjectURL(url);
  }catch(e){}
  copyJSON();
}

function copyJSON(){
  const json = JSON.stringify(collectData(), null, 2);
  showCopyModal(json);
}

function fallbackCopy(text){
  const ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;left:-9999px;top:0';
  document.body.appendChild(ta);ta.focus();ta.select();
  try{document.execCommand('copy');showToast('已複製到剪貼簿');}catch(e){showCopyModal(text);}
  document.body.removeChild(ta);
}

function showCopyModal(text){
  const o=document.createElement('div');o.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px';
  const b=document.createElement('div');b.style.cssText='background:#fff;border-radius:12px;padding:16px;width:100%;max-height:70vh;display:flex;flex-direction:column;gap:12px';
  b.innerHTML=`<div style="font-weight:600;font-size:15px">長按下方文字全選→複製</div><textarea readonly style="flex:1;min-height:200px;font-size:12px;font-family:monospace;border:1px solid #ddd;border-radius:8px;padding:8px">${text.split('<').join('&lt;')}</textarea><button onclick="this.closest('div[style*=fixed]').remove()" style="padding:10px;background:var(--brand);color:#fff;border:none;border-radius:8px;font-size:15px">關閉</button>`;
  o.appendChild(b);document.body.appendChild(o);b.querySelector('textarea').focus();b.querySelector('textarea').select();
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}

window.addEventListener('load',function(){
  updateProgress();
  if(!document.getElementById('f_eval_date').value){
    const d=new Date();
    document.getElementById('f_eval_date').value=d.getFullYear()+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+String(d.getDate()).padStart(2,'0');
  }
});
</script>
