<head>

<style>

lor:var(--brand);box-shadow:0 0 0 3px rgba(214,90,49,.12)}textarea{resize:vertical}.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}.check-grid{display:flex;flex-wrap:wrap;gap:8px}.check-item input{display:none}.check-item label{display:block;padding:8px 14px;border:1px solid var(--border);border-radius:8px;font-size:14px;cursor:pointer;transition:.15s}.check-item input:checked+label{background:var(--brand);color:#fff;border-color:var(--brand)}.radio-inline{display:flex;flex-wrap:wrap;gap:8px}.radio-item input{display:none}.radio-item label{display:block;padding:8px 14px;border:1px solid var(--border);border-radius:8px;font-size:14px;cursor:pointer;transition:.15s}.radio-item input:checked+label{background:var(--brand);color:#fff;border-color:var(--brand)}.divider{border:none;border-top:1px solid var(--border);margin:16px 0}.sub-label{font-size:14px;font-weight:600;color:var(--brown);margin:16px 0 8px;padding-bottom:4px;border-bottom:2px solid var(--amber)}.cond-block{display:none;margin-top:8px;padding:12px;background:var(--brand-light);border-radius:8px}.cond-block.show{display:block}.action-bar{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);padding:12px 16px;display:flex;gap:10px;z-index:100}.btn{flex:1;padding:12px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer}.btn-primary{background:var(--brand);color:#fff}.btn-secondary{background:var(--bg);color:var(--text);border:1px solid var(--border)}.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:#333;color:#fff;padding:10px 20px;border-radius:10px;font-size:14px;opacity:0;transition:.3s;pointer-events:none;z-index:200}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="header"><h1>編號04 沐浴椅/便盆椅</h1><div class="sub">移動式清洗槽、沐浴椅、便盆椅、附加功能</div></div>
<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
<div id="toast" class="toast"></div>

<!-- S1: 活動需求 -->
<div class="section"><div class="section-header" onclick="toggleSection(this)"><div class="num">1</div><div class="title">活動需求</div><div class="chevron">›</div></div>
<div class="section-body">
  <div class="field"><label class="field-label">使用場合（可複選）</label><div class="check-grid">
    <div class="check-item"><input type="checkbox" name="place_home" id="ph" value="居家生活"><label for="ph">居家生活</label></div>
    <div class="check-item"><input type="checkbox" name="place_inst" id="pi2" value="照顧機構"><label for="pi2">照顧機構</label></div>
    <div class="check-item"><input type="checkbox" name="place_school" id="ps" value="校園學習"><label for="ps">校園學習</label></div>
    <div class="check-item"><input type="checkbox" name="place_work" id="pw" value="職場就業"><label for="pw">職場就業</label></div>
  </div><div class="field" style="margin-top:8px"><input type="text" id="place_other" placeholder="其他場合"></div></div>

  <div class="field"><label class="field-label">活動需求（可複選）</label><div class="check-grid">
    <div class="check-item"><input type="checkbox" name="need_independent" id="ni" value="個案獨立浴廁"><label for="ni">個案獨立浴廁</label></div>
    <div class="check-item"><input type="checkbox" name="need_assist" id="na" value="由照顧者協助浴廁"><label for="na">照顧者協助浴廁</label></div>
  </div><div class="field" style="margin-top:8px"><input type="text" id="need_other" placeholder="其他活動需求"></div></div>

  <div class="field"><label class="field-label">使用環境（可複選）</label><div class="check-grid">

    <div class="check-item"><input type="checkbox" name="env_narrow" id="en" value="浴廁空間狹小"><label for="en">空間狹小</label></div>
    <div class="check-item"><input type="checkbox" name="env_thresh" id="et" value="需跨越門檻"><label for="et">跨越門檻</label></div>
  </div><div class="field" style="margin-top:8px"><input type="text" id="env_other" placeholder="其他環境"></div></div>

  <div class="field"><label class="field-label">人力支持（可複選）</label><div class="check-grid">
    <div class="check-item"><input type="checkbox" name="sup_alone" id="sa" value="獨居"><label for="sa">獨居</label></div>
    <div class="check-item"><input type="checkbox" name="sup_cohabit" id="sc" value="有同住者"><label for="sc">有同住者</label></div>
    <div class="check-item"><input type="checkbox" name="sup_pro" id="sp" value="有專業人力協助"><label for="sp">有專業人力</label></div>
  </div>
    <div class="field" style="margin-top:8px"><input type="text" id="sup_pro_detail" placeholder="專業人力說明"></div>
    <div class="field"><input type="text" id="sup_other" placeholder="其他人力支持"></div>
  </div>
</div></div>

<!-- S2: 目前輔具(三大類) -->
<div class="section"><div class="section-header collapsed" onclick="toggleSection(this)"><div class="num">2</div><div class="title">目前使用的輔具</div><div class="chevron">›</div></div>
<div class="section-body hidden">

  <div class="field"><label class="field-label">來源</label><div class="radio-inline">

  <div class="row"><div class="field"><label class="field-label">已使用約(年)</label><input type="text" inputmode="decimal" id="wash_years"></div><div class="field" style="display:flex;align-items:end"><div class="check-item"><input type="checkbox" name="wash_yr_unknown" id="wyu" value="年限不明"><label for="wyu">年限不明</label></div></div></div>
  <div class="field"><label class="field-label">使用情形</label><div class="radio-inline">
    <div class="radio-item"><input type="radio" name="wash_status" value="已損壞不堪修復，需更新" id="wst1"><label for="wst1">損壞需更新</label></div>
    <div class="radio-item"><input type="radio" name="wash_status" value="規格或功能不符使用者現在的需求，需更換" id="wst2"><label for="wst2">規格不符</label></div>
    <div class="radio-item"><input type="radio" name="wash_status" value="適合繼續使用，但需要另行購置於不同場所使用" id="wst3"><label for="wst3">另購不同場所</label></div>
    <div class="radio-item"><input type="radio" name="wash_status" value="適合繼續使用，無需更換" id="wst4"><label for="wst4">無需更換</label></div>
  </div><div class="field" style="margin-top:8px"><input type="text" id="wash_status_other" placeholder="其他"></div></div>

  <hr class="divider">

    <div class="check-item"><input type="checkbox" name="shower_af_transfer" id="sat" value="具利於移位之扶手"><label for="sat">利於移位扶手</label></div>

  </div></div>
  <div class="field"><label class="field-label">來源</label><div class="radio-inline">
    <div class="radio-item"><input type="radio" name="shower_src" value="政府補助" id="ss1"><label for="ss1">政府補助</label></div>
    <div class="radio-item"><input type="radio" name="shower_src" value="二手輔具" id="ss2"><label for="ss2">二手輔具</label></div>
    <div class="radio-item"><input type="radio" name="shower_src" value="自購" id="ss3"><label for="ss3">自購</label></div>
    <div class="radio-item"><input type="radio" name="shower_src" value="其他" id="ss4"><label for="ss4">其他</label></div>
  </div><div class="cond-block" id="showerSrcDetail"><div class="field"><label class="field-label">政府補助類型</label><div class="check-grid" id="showerGovGrid"></div><div class="field" style="margin-top:8px"><input type="text" id="shower_gov_other" placeholder="其他補助"></div></div><div class="field"><label class="field-label">二手方式</label><div class="radio-inline"><div class="radio-item"><input type="radio" name="shower_2nd" value="租借" id="s2a"><label for="s2a">租借</label></div><div class="radio-item"><input type="radio" name="shower_2nd" value="媒合" id="s2b"><label for="s2b">媒合</label></div></div></div><div class="field"><input type="text" id="shower_src_other_text" placeholder="其他來源"></div></div></div>
  <div class="row"><div class="field"><label class="field-label">已使用約(年)</label><input type="text" inputmode="decimal" id="shower_years"></div><div class="field" style="display:flex;align-items:end"><div class="check-item"><input type="checkbox" name="shower_yr_unknown" id="syu" value="年限不明"><label for="syu">年限不明</label></div></div></div>
  <div class="field"><label class="field-label">使用情形</label><div class="radio-inline">
    <div class="radio-item"><input type="radio" name="shower_status" value="已損壞不堪修復，需更新" id="sst1"><label for="sst1">損壞需更新</label></div>
    <div class="radio-item"><input type="radio" name="shower_status" value="規格或功能不符使用者現在的需求，需更換" id="sst2"><label for="sst2">規格不符</label></div>
    <div class="radio-item"><input type="radio" name="shower_status" value="適合繼續使用，但需要另行購置於不同場所使用" id="sst3"><label for="sst3">另購不同場所</label></div>
    <div class="radio-item"><input type="radio" name="shower_status" value="適合繼續使用，無需更換" id="sst4"><label for="sst4">無需更換</label></div>
  </div><div class="field" style="margin-top:8px"><input type="text" id="shower_status_other" placeholder="其他"></div></div>

  <hr class="divider">
  <div class="sub-label">便盆椅</div>
  <div class="field"><label class="field-label">種類</label><div class="check-grid">
    <div class="check-item"><input type="checkbox" name="cur_toilet_riser" id="ctr" value="馬桶增高器"><label for="ctr">馬桶增高器</label></div>

  </div><div class="field" style="margin-top:8px"><input type="text" id="commode_other_type" placeholder="其他種類"></div></div>
  <div class="field"><label class="field-label">附加功能（可複選）</label><div class="check-grid">
    <div class="check-item"><input type="checkbox" name="commode_af_wheel" id="caw" value="附輪"><label for="caw">附輪</label></div>
    <div class="check-item"><input type="checkbox" name="commode_af_transfer" id="cat2" value="具利於移位之扶手"><label for="cat2">利於移位扶手</label></div>
    <div class="check-item"><input type="checkbox" name="commode_af_recline" id="car" value="具仰躺功能"><label for="car">仰躺</label></div>
    <div class="check-item"><input type="checkbox" name="commode_af_tilt" id="cati" value="具空中傾倒功能"><label for="cati">空中傾倒</label></div>
  </div></div>
  <div class="field"><label class="field-label">來源</label><div class="radio-inline">
    <div class="radio-item"><input type="radio" name="commode_src" value="政府補助" id="cs1"><label for="cs1">政府補助</label></div>
    <div class="radio-item"><input type="radio" name="commode_src" value="二手輔具" id="cs2"><label for="cs2">二手輔具</label></div>
    <div class="radio-item"><input type="radio" name="commode_src" value="自購" id="cs3"><label for="cs3">自購</label></div>

<!-- S3: 身體功能評估 -->
<div class="section"><div class="section-header collapsed" onclick="toggleSection(this)"><div class="num">3</div><div class="title">身體功能評估</div><div class="chevron">›</div></div>
<div class="section-body hidden">
  <div class="sub-label">診斷（可複選）</div>
  <div class="check-grid" id="dxGrid04"></div>
  <div class="row" style="margin-top:8px"><div class="field"><input type="text" id="dx_stroke_side" placeholder="中風偏癱(左/右)"></div><div class="field"><input type="text" id="dx_sci_level" placeholder="脊損位(頸/胸/腰/薦)"></div></div>
  <div class="field"><input type="text" id="dx_tbi_side" placeholder="腦外傷(左/右)"></div>
  <div class="field"><input type="text" id="dx_other_text" placeholder="其他診斷"></div>

  <div class="sub-label">管路/造口（可複選）</div>
  <div class="check-grid" id="tubeGrid04"></div>

  <hr class="divider">
  <div class="sub-label">身體尺寸</div>
  <div class="row"><div class="field"><label class="field-label">身高(cm)</label><input type="text" inputmode="decimal" id="f_height"></div><div class="field"><label class="field-label">體重(kg)</label><input type="text" inputmode="decimal" id="f_weight"></div></div>
  <div class="field"><label class="field-label">臀寬(cm)</label><input type="text" inputmode="decimal" id="hip_w"></div>

  <hr class="divider">
  <div class="sub-label">身體姿態</div>

  <div class="field"><label class="field-label">脊柱（可複選）</label><div class="check-grid">

    <div class="check-item"><input type="checkbox" name="spine_scol" id="sps" value="脊柱側彎"><label for="sps">脊柱側彎</label></div>
    <div class="check-item"><input type="checkbox" name="spine_lordosis" id="spl" value="過度前凸"><label for="spl">過度前凸</label></div>
    <div class="check-item"><input type="checkbox" name="spine_kyphosis" id="spk" value="過度後凸"><label for="spk">過度後凸</label></div>
  </div><div class="field" style="margin-top:8px"><input type="text" id="spine_other" placeholder="其他變形"></div></div>

    <div class="radio-item"><input type="radio" name="hip" value="正常" id="hip1"><label for="hip1">正常</label></div>
    <div class="radio-item"><input type="radio" name="hip" value="內收變形" id="hip2"><label for="hip2">內收變形</label></div>
    <div class="radio-item"><input type="radio" name="hip" value="外展變形" id="hip3"><label for="hip3">外展變形</label></div>
    <div class="radio-item"><input type="radio" name="hip" value="風吹式變形" id="hip4"><label for="hip4">風吹式變形</label></div>
  </div><div class="field" style="margin-top:8px"><input type="text" id="hip_other" placeholder="其他髖部"></div></div>

<script>
function toggleSection(el){el.classList.toggle('collapsed');el.nextElementSibling.classList.toggle('hidden');}

// Diagnosis
(function(){const dx=[['dx_veg','植物人'],['dx_dementia','失智症'],['dx_stroke','中風偏癱'],['dx_sci','脊髓損傷'],['dx_tbi','腦外傷'],['dx_cerebellar','小腦萎縮症'],['dx_cp','腦性麻痺'],['dx_delay','發展遲緩'],['dx_mnd','運動神經元疾病'],['dx_parkinson','巴金森氏症'],['dx_muscular','肌肉萎縮症'],['dx_polio','小兒麻痺'],['dx_fracture','骨折'],['dx_amputation','截肢'],['dx_arthritis','關節炎']];const c=document.getElementById('dxGrid04');dx.forEach(([id,l])=>{c.innerHTML+=`<div class="check-item"><input type="checkbox" name="${id}" id="${id}" value="${l}"><label for="${id}">${l}</label></div>`;});})();

// Tube/stoma
(function(){const items=[['tube_none','無'],['tube_trach','氣切管'],['tube_ng','鼻胃管'],['tube_foley','尿管'],['tube_gastro','胃造口'],['tube_colost','腸造口'],['tube_cystost','膀胱造口']];const c=document.getElementById('tubeGrid04');items.forEach(([id,l])=>{c.innerHTML+=`<div class="check-item"><input type="checkbox" name="${id}" id="${id}" value="${l}"><label for="${id}">${l}</label></div>`;});c.innerHTML+='<div class="field" style="width:100%;margin-top:8px"><input type="text" id="tube_other" placeholder="其他管路/造口"></div>';})();

// Pelvis
(function(){const items=[['pelvis_normal','正常'],['pelvis_tilt','向前/後傾'],['pelvis_lat','向左/右傾斜'],['pelvis_rot','向左/右旋轉'],['pelvis_ant_slide','向前滑動'],['pelvis_post_slide','向後滑動'],['pelvis_l_slide','向左滑動'],['pelvis_r_slide','向右滑動'],['pelvis_no_slide','無明顯滑動']];const c=document.getElementById('pelvisGrid04');items.forEach(([id,l])=>{c.innerHTML+=`<div class="check-item"><input type="checkbox" name="${id}" id="${id}" value="${l}"><label for="${id}">${l}</label></div>`;});})();

// Gov subsidy grids for 3 categories
(function(){const govItems=[['身障'],['長照'],['職災'],['職再'],['教育'],['榮民'],['健保']];['washGovGrid','showerGovGrid','commodeGovGrid'].forEach(gid=>{const c=document.getElementById(gid);const prefix=gid.replace('GovGrid','');govItems.forEach(([l],i)=>{const id=prefix+'_gov_'+i;c.innerHTML+=`<div class="check-item"><input type="checkbox" name="${id}" id="${id}" value="${l}"><label for="${id}">${l}</label></div>`;});});})();

// Source detail toggles
['wash_src','shower_src','commode_src'].forEach(name=>{
  const detailId=name.replace('_src','')+'SrcDetail';
  document.querySelectorAll(`input[name="${name}"]`).forEach(r=>r.addEventListener('change',function(){document.getElementById(detailId).classList.add('show');}));
});

// Exempt
document.querySelectorAll('input[name="exempt"]').forEach(r=>r.addEventListener('change',function(){document.getElementById('exemptDetail').style.display=this.value==='需要'?'block':'none';}));

function updateProgress(){const n=document.querySelectorAll('input[type="radio"]:checked,input[type="checkbox"]:checked').length;const f=Array.from(document.querySelectorAll('input[type="text"],textarea')).filter(el=>el.value.trim()).length;document.getElementById('progressFill').style.width=Math.min(100,Math.round((n+f)/35*100))+'%';}
document.addEventListener('change',updateProgress);document.addEventListener('input',updateProgress);

function collectData(){const d={};document.querySelectorAll('input[type="text"],textarea').forEach(el=>{if(el.id&&el.value.trim())d[el.id]=el.value.trim();});document.querySelectorAll('input[type="radio"]:checked').forEach(el=>{d[el.name]=el.value;});const c={};document.querySelectorAll('input[type="checkbox"]:checked').forEach(el=>{const k=el.name||el.id;if(!c[k])c[k]=[];c[k].push(el.value);});d._checks=c;d._timestamp=new Date().toISOString();d._report='編號04-便盆椅';return d;}
function saveLocal(){localStorage.setItem('form04_draft',JSON.stringify(collectData()));showToast('已暫存');}
function exportJSON(){const d=collectData();const j=JSON.stringify(d,null,2);try{const b=new Blob([j],{type:'application/json'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=`04_便盆椅_${d.f_evaluator||'草稿'}_${new Date().toISOString().slice(0,10)}.json`;a.click();URL.revokeObjectURL(u);}catch(e){}copyJSON();}
function copyJSON(){const j=JSON.stringify(collectData(),null,2);showCopyModal(j);}
function fallbackCopy(t){const ta=document.createElement('textarea');ta.value=t;ta.style.cssText='position:fixed;left:-9999px';document.body.appendChild(ta);ta.focus();ta.select();try{document.execCommand('copy');showToast('已複製');}catch(e){}document.body.removeChild(ta);}
function showCopyModal(text){const o=document.createElement('div');o.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px';const b=document.createElement('div');b.style.cssText='background:#fff;border-radius:12px;padding:16px;width:100%;max-height:70vh;display:flex;flex-direction:column;gap:12px';b.innerHTML=`<div style="font-weight:600;font-size:15px">長按下方文字 → 全選 → 複製</div><textarea readonly style="flex:1;min-height:200px;font-size:12px;font-family:monospace;border:1px solid #ddd;border-radius:8px;padding:8px">${text.split('<').join('&lt;')}</textarea><button onclick="this.closest('div[style*=fixed]').remove()" style="padding:10px;background:var(--brand);color:#fff;border:none;border-radius:8px;font-size:15px">關閉</button>`;o.appendChild(b);document.body.appendChild(o);b.querySelector('textarea').focus();b.querySelector('textarea').select();}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}
window.addEventListener('load',function(){updateProgress();if(!document.getElementById('f_eval_date').value){const d=new Date();document.getElementById('f_eval_date').value=d.getFullYear()+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+String(d.getDate()).padStart(2,'0');}});
</script>
</body>
</html>
