<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>總結報告 評估表</title>
<style>
:root{--brand:#D65A31;--brand-light:#fef0eb;--brown:#4B3621;--bg:#fafaf8;--card:#fff;--border:#e2e0d8;--text:#2c2c2a;--text2:#6b6a65;--text3:#9c9a92;--amber:#E6AF2E;--radius:12px;--shadow:0 1px 3px rgba(0,0,0,.06)}*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,"Noto Sans TC","Microsoft JhengHei",sans-serif;background:var(--bg);color:var(--text);line-height:1.6;padding-bottom:120px}.header{background:var(--brand);color:#fff;padding:16px 20px;position:sticky;top:0;z-index:100}.header h1{font-size:18px;font-weight:600}.header .sub{font-size:13px;opacity:.85;margin-top:2px}.progress-bar{height:3px;background:var(--border);position:sticky;top:60px;z-index:99}.progress-fill{height:100%;background:var(--brand);transition:width .3s;width:0%}.section{background:var(--card);margin:12px;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;border:1px solid var(--border)}.section-header{padding:14px 16px;background:linear-gradient(135deg,var(--brand-light),#fff);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none}.section-header .num{background:var(--brand);color:#fff;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0}.section-header .title{font-size:15px;font-weight:600;color:var(--brown)}.section-header .chevron{margin-left:auto;font-size:18px;color:var(--text3);transition:transform .2s}.section-header.collapsed .chevron{transform:rotate(-90deg)}.section-body{padding:16px}.section-body.hidden{display:none}.field{margin-bottom:16px}.field:last-child{margin-bottom:0}.field-label{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:6px;display:block}input[type="text"],input[type="text"],textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:15px;background:var(--card);color:var(--text);-webkit-appearance:none}input:focus,textarea:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(214,90,49,.12)}textarea{resize:vertical}.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}.check-grid{display:flex;flex-wrap:wrap;gap:8px}.check-item input{display:none}.check-item label{display:block;padding:8px 14px;border:1px solid var(--border);border-radius:8px;font-size:14px;cursor:pointer;transition:.15s}.check-item input:checked+label{background:var(--brand);color:#fff;border-color:var(--brand)}.radio-inline{display:flex;flex-wrap:wrap;gap:8px}.radio-item input{display:none}.radio-item label{display:block;padding:8px 14px;border:1px solid var(--border);border-radius:8px;font-size:14px;cursor:pointer;transition:.15s}.radio-item input:checked+label{background:var(--brand);color:#fff;border-color:var(--brand)}.divider{border:none;border-top:1px solid var(--border);margin:16px 0}.action-bar{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);padding:12px 16px;display:flex;gap:10px;z-index:100}.btn{flex:1;padding:12px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer}.btn-primary{background:var(--brand);color:#fff}.btn-secondary{background:var(--bg);color:var(--text);border:1px solid var(--border)}.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:#333;color:#fff;padding:10px 20px;border-radius:10px;font-size:14px;opacity:0;transition:.3s;pointer-events:none;z-index:200}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="header"><h1>總結報告 評估表</h1><div class="sub">臺北市西區輔具資源中心</div></div>
<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
<div id="toast" class="toast"></div>

<!-- S1: 評估結果 -->
<div class="section"><div class="section-header" onclick="toggleSection(this)"><div class="num">1</div><div class="title">評估結果</div><div class="chevron">›</div></div>
<div class="section-body">

  <div class="field">
    <label class="field-label">申請評估項目</label>
    <textarea id="eval_items" rows="3" placeholder="輸入申請評估的輔具項目"></textarea>
  </div>

  <div class="field">
    <label class="field-label">評估結果（可複選）</label>
    <div class="check-grid">
      <div class="check-item"><input type="checkbox" name="result" id="r_noeval" value="無須評估"><label for="r_noeval">無須評估</label></div>
      <div class="check-item"><input type="checkbox" name="result" id="r_notfit" value="評估不適合所請輔具"><label for="r_notfit">評估不適合所請輔具</label></div>
      <div class="check-item"><input type="checkbox" name="result" id="r_repair" value="建議維修/租借"><label for="r_repair">建議維修/租借</label></div>
      <div class="check-item"><input type="checkbox" name="result" id="r_other" value="其他建議"><label for="r_other">其他建議</label></div>
    </div>
  </div>

  <div class="field">
    <label class="field-label">說明</label>
    <textarea id="result_desc" rows="4" placeholder="詳細說明評估結果"></textarea>
  </div>

  <hr class="divider">

  <div class="field">
    <label class="field-label">是否一併核發免評項目核可編號</label>
    <div class="radio-inline">
      <div class="radio-item"><input type="radio" name="exempt" value="需要" id="ex_y"><label for="ex_y">需要</label></div>
      <div class="radio-item"><input type="radio" name="exempt" value="不需要" id="ex_n"><label for="ex_n">不需要</label></div>
    </div>
  </div>
  <div id="exemptDetail" style="display:none">
    <div class="row">
      <div class="field"><label class="field-label">長照項目</label><input type="text" id="exempt_ltc" placeholder="長照免評項目編號"></div>
      <div class="field"><label class="field-label">身障項目</label><input type="text" id="exempt_disability" placeholder="身障免評項目編號"></div>
    </div>
  </div>

</div></div>

<!-- S2: 評估資訊 -->
<div class="section"><div class="section-header" onclick="toggleSection(this)"><div class="num">2</div><div class="title">評估資訊</div><div class="chevron">›</div></div>
<div class="section-body">
  <div class="field"><label class="field-label">評估單位</label><input type="text" id="f_eval_unit" value="臺北市西區輔具資源中心"></div>
  <div class="row">
    <div class="field"><label class="field-label">評估人員</label><input type="text" id="f_evaluator" value="莊博文"></div>
    <div class="field"><label class="field-label">職稱</label><input type="text" id="f_eval_title" value="甲類輔具評估人員"></div>
  </div>
  <div class="field"><label class="field-label">評估日期</label><input type="text" id="f_eval_date" placeholder="YYYY/MM/DD"></div>
</div></div>

<div class="action-bar">
  <button class="btn btn-secondary" onclick="saveLocal()">暫存</button>
  <button class="btn btn-secondary" onclick="copyJSON()">複製 JSON</button>
  <button class="btn btn-primary" onclick="exportJSON()">匯出 JSON</button>
</div>

<script>
function toggleSection(el){el.classList.toggle('collapsed');el.nextElementSibling.classList.toggle('hidden');}

document.querySelectorAll('input[name="exempt"]').forEach(r=>r.addEventListener('change',function(){
  document.getElementById('exemptDetail').style.display=this.value==='需要'?'block':'none';
}));

function updateProgress(){
  const checked=document.querySelectorAll('input[type="radio"]:checked,input[type="checkbox"]:checked').length;
  const filled=Array.from(document.querySelectorAll('input[type="text"],textarea')).filter(el=>el.value.trim()).length;
  document.getElementById('progressFill').style.width=Math.min(100,Math.round((checked+filled)/8*100))+'%';
}
document.addEventListener('change',updateProgress);
document.addEventListener('input',updateProgress);

function collectData(){
  const d={};
  document.querySelectorAll('input[type="text"],textarea').forEach(el=>{if(el.id&&el.value.trim())d[el.id]=el.value.trim();});
  document.querySelectorAll('input[type="radio"]:checked').forEach(el=>{d[el.name]=el.value;});
  const c={};
  document.querySelectorAll('input[type="checkbox"]:checked').forEach(el=>{const k=el.name||el.id;if(!c[k])c[k]=[];c[k].push(el.value);});
  d._checks=c;d._timestamp=new Date().toISOString();d._report='總結報告';return d;
}

function saveLocal(){localStorage.setItem('form_summary_draft',JSON.stringify(collectData()));showToast('已暫存');}

function exportJSON(){
  const d=collectData();const j=JSON.stringify(d,null,2);
  try{const b=new Blob([j],{type:'application/json'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=`總結報告_${d.f_evaluator||'草稿'}_${new Date().toISOString().slice(0,10)}.json`;a.click();URL.revokeObjectURL(u);}catch(e){}
  copyJSON();
}

function copyJSON(){
  const j=JSON.stringify(collectData(),null,2);
  showCopyModal(j);
}

function fallbackCopy(t){const ta=document.createElement('textarea');ta.value=t;ta.style.cssText='position:fixed;left:-9999px';document.body.appendChild(ta);ta.focus();ta.select();try{document.execCommand('copy');showToast('已複製');}catch(e){}document.body.removeChild(ta);}

function showCopyModal(text){const o=document.createElement('div');o.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px';const b=document.createElement('div');b.style.cssText='background:#fff;border-radius:12px;padding:16px;width:100%;max-height:70vh;display:flex;flex-direction:column;gap:12px';b.innerHTML='<div style="font-weight:600;font-size:15px">長按下方文字 → 全選 → 複製</div><textarea readonly style="flex:1;min-height:200px;font-size:12px;font-family:monospace;border:1px solid #ddd;border-radius:8px;padding:8px">'+text.split('<').join('&lt;')+'</textarea><button onclick="this.parentElement.parentElement.remove()" style="padding:10px;background:var(--brand);color:#fff;border:none;border-radius:8px;font-size:15px">關閉</button>';o.appendChild(b);document.body.appendChild(o);b.querySelector('textarea').focus();b.querySelector('textarea').select();}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}

window.addEventListener('load',function(){
  updateProgress();
  if(!document.getElementById('f_eval_date').value){const d=new Date();document.getElementById('f_eval_date').value=d.getFullYear()+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+String(d.getDate()).padStart(2,'0');}
});
</script>
</body>
</html>
