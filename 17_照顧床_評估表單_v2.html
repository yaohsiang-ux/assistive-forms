<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>編號17 氣墊床及居家用照顧床</title>
<style>
:root{--brand:#D65A31;--brand-light:#fef0eb;--brown:#4B3621;--bg:#fafaf8;--card:#fff;--border:#e2e0d8;--text:#2c2c2a;--text2:#6b6a65;--text3:#9c9a92;--amber:#E6AF2E;--radius:12px;--shadow:0 1px 3px rgba(0,0,0,.06)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"Noto Sans TC","Microsoft JhengHei",sans-serif;background:var(--bg);color:var(--text);line-height:1.6;padding-bottom:120px}
.header{background:var(--brand);color:#fff;padding:16px 20px;position:sticky;top:0;z-index:100}.header h1{font-size:18px;font-weight:600}.header .sub{font-size:13px;opacity:.85;margin-top:2px}
.progress-bar{height:3px;background:var(--border);position:sticky;top:60px;z-index:99}.progress-fill{height:100%;background:var(--brand);transition:width .3s;width:0%}
.section{background:var(--card);margin:12px;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;border:1px solid var(--border)}
.section-header{padding:14px 16px;background:linear-gradient(135deg,var(--brand-light),#fff);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none}
.section-header .num{background:var(--brand);color:#fff;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0}
.section-header .title{font-size:15px;font-weight:600;color:var(--brown)}.section-header .chevron{margin-left:auto;font-size:18px;color:var(--text3);transition:transform .2s}
.section-header.collapsed .chevron{transform:rotate(-90deg)}.section-body{padding:16px}.section-body.hidden{display:none}
.field{margin-bottom:16px}.field:last-child{margin-bottom:0}.field-label{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:6px;display:block}
input[type="text"],textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:15px;background:var(--card);color:var(--text);-webkit-appearance:none}
input:focus,textarea:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(214,90,49,.12)}
textarea{resize:vertical}.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.check-grid{display:flex;flex-wrap:wrap;gap:8px}.check-item input{display:none}.check-item label{display:block;padding:8px 14px;border:1px solid var(--border);border-radius:8px;font-size:14px;cursor:pointer;transition:.15s}
.check-item input:checked+label{background:var(--brand);color:#fff;border-color:var(--brand)}
.radio-inline{display:flex;flex-wrap:wrap;gap:8px}.radio-item input{display:none}.radio-item label{display:block;padding:8px 14px;border:1px solid var(--border);border-radius:8px;font-size:14px;cursor:pointer;transition:.15s}
.radio-item input:checked+label{background:var(--brand);color:#fff;border-color:var(--brand)}
.divider{border:none;border-top:1px solid var(--border);margin:16px 0}
.sub-label{font-size:14px;font-weight:600;color:var(--brown);margin:16px 0 8px;padding-bottom:4px;border-bottom:2px solid var(--amber)}
.cond-block{display:none;margin-top:8px;padding:12px;background:var(--brand-light);border-radius:8px}
.cond-block.show{display:block}
.action-bar{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);padding:12px 16px;display:flex;gap:10px;z-index:100}
.btn{flex:1;padding:12px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer}.btn-primary{background:var(--brand);color:#fff}.btn-secondary{background:var(--bg);color:var(--text);border:1px solid var(--border)}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:#333;color:#fff;padding:10px 20px;border-radius:10px;font-size:14px;opacity:0;transition:.3s;pointer-events:none;z-index:200}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="header"><h1>編號17 氣墊床及居家用照顧床</h1><div class="sub">臺北市西區輔具資源中心</div></div>
<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
<div id="toast" class="toast"></div>

<!-- S1: 活動需求 -->
<div class="section"><div class="section-header" onclick="toggleSection(this)"><div class="num">1</div><div class="title">活動需求</div><div class="chevron">›</div></div>
<div class="section-body">
  <div class="sub-label">氣墊床需求（可複選）</div>
  <div class="check-grid">
    <div class="check-item"><input type="checkbox" name="air_prevent" id="ap" value="預防壓傷"><label for="ap">預防壓傷</label></div>
    <div class="check-item"><input type="checkbox" name="air_care" id="ac" value="照護壓傷"><label for="ac">照護壓傷</label></div>
  </div>
  <div class="field" style="margin-top:8px"><input type="text" id="air_other" placeholder="其他氣墊床需求"></div>

  <div class="sub-label">居家用照顧床需求（可複選）</div>
  <div class="check-grid">
    <div class="check-item"><input type="checkbox" name="bed_turn" id="bt" value="協助翻身"><label for="bt">協助翻身</label></div>
    <div class="check-item"><input type="checkbox" name="bed_sit" id="bs" value="協助坐起"><label for="bs">協助坐起</label></div>
    <div class="check-item"><input type="checkbox" name="bed_transfer" id="btr" value="協助轉移位"><label for="btr">協助轉移位</label></div>
    <div class="check-item"><input type="checkbox" name="bed_nursing" id="bn" value="照顧者護理"><label for="bn">照顧者護理</label></div>
    <div class="check-item"><input type="checkbox" name="bed_pressure" id="bp" value="減壓"><label for="bp">減壓</label></div>
  </div>
  <div class="field" style="margin-top:8px"><input type="text" id="bed_other" placeholder="其他照顧床需求"></div>

  <div class="field" style="margin-top:12px"><label class="field-label">使用環境</label>
    <div class="radio-inline">
      <div class="radio-item"><input type="radio" name="env" value="居家" id="env_h"><label for="env_h">居家</label></div>
      <div class="radio-item"><input type="radio" name="env" value="非居家" id="env_nh"><label for="env_nh">非居家</label></div>
    </div>
  </div>

  <div class="field"><label class="field-label">人力支持（可複選）</label>
    <div class="check-grid">
      <div class="check-item"><input type="checkbox" name="sup_alone" id="sa" value="獨居"><label for="sa">獨居</label></div>
      <div class="check-item"><input type="checkbox" name="sup_cohabit" id="sc" value="有同住者"><label for="sc">有同住者</label></div>
      <div class="check-item"><input type="checkbox" name="sup_pro" id="sp" value="有專業人力協助"><label for="sp">有專業人力</label></div>
    </div>
    <div class="field" style="margin-top:8px"><input type="text" id="sup_pro_detail" placeholder="專業人力說明"></div>
    <div class="field"><input type="text" id="sup_other" placeholder="其他人力支持"></div>
  </div>
</div></div>

<!-- S2: 目前輔具(床墊+床架) -->
<div class="section"><div class="section-header collapsed" onclick="toggleSection(this)"><div class="num">2</div><div class="title">目前使用的輔具</div><div class="chevron">›</div></div>
<div class="section-body hidden">
  <div class="sub-label">床墊</div>
  <div class="field"><label class="field-label">床面總高(cm)</label><input type="text" inputmode="decimal" id="bed_total_h" placeholder="公分"></div>
  <div class="field"><label class="field-label">輔具種類（可複選）</label>
    <div class="check-grid">
      <div class="check-item"><input type="checkbox" name="mat_spring" id="ms" value="彈簧床墊"><label for="ms">彈簧床墊</label></div>
      <div class="check-item"><input type="checkbox" name="mat_foam" id="mf" value="泡棉減壓床墊"><label for="mf">泡棉減壓</label></div>
      <div class="check-item"><input type="checkbox" name="mat_latex" id="ml" value="乳膠床墊"><label for="ml">乳膠</label></div>
      <div class="check-item"><input type="checkbox" name="mat_gel" id="mg" value="固態凝膠床墊"><label for="mg">固態凝膠</label></div>
      <div class="check-item"><input type="checkbox" name="mat_air" id="ma" value="氣墊床"><label for="ma">氣墊床</label></div>
    </div>
    <div class="field" style="margin-top:8px"><input type="text" id="mat_other_type" placeholder="其他床墊種類"></div>
  </div>

  <div class="field"><label class="field-label">輔具來源</label>
    <div class="radio-inline">
      <div class="radio-item"><input type="radio" name="mat_source" value="政府補助" id="msrc1"><label for="msrc1">政府補助</label></div>
      <div class="radio-item"><input type="radio" name="mat_source" value="二手輔具" id="msrc2"><label for="msrc2">二手輔具</label></div>
      <div class="radio-item"><input type="radio" name="mat_source" value="自購" id="msrc3"><label for="msrc3">自購</label></div>
      <div class="radio-item"><input type="radio" name="mat_source" value="其他" id="msrc4"><label for="msrc4">其他</label></div>
    </div>
    <div id="matSourceDetail" class="cond-block">
      <div class="field"><label class="field-label">政府補助類型（可複選）</label>
        <div class="check-grid">
          <div class="check-item"><input type="checkbox" name="mat_gov_disability" id="mgd" value="身障"><label for="mgd">身障</label></div>
          <div class="check-item"><input type="checkbox" name="mat_gov_ltc" id="mgl" value="長照"><label for="mgl">長照</label></div>
          <div class="check-item"><input type="checkbox" name="mat_gov_work" id="mgw" value="職災"><label for="mgw">職災</label></div>
          <div class="check-item"><input type="checkbox" name="mat_gov_rehab" id="mgr" value="職再"><label for="mgr">職再</label></div>
          <div class="check-item"><input type="checkbox" name="mat_gov_edu" id="mge" value="教育"><label for="mge">教育</label></div>
          <div class="check-item"><input type="checkbox" name="mat_gov_vet" id="mgv" value="榮民"><label for="mgv">榮民</label></div>
          <div class="check-item"><input type="checkbox" name="mat_gov_nhi" id="mgn" value="健保"><label for="mgn">健保</label></div>
        </div>
        <div class="field" style="margin-top:8px"><input type="text" id="mat_gov_other" placeholder="其他補助來源"></div>
      </div>
      <div class="field"><label class="field-label">二手輔具方式</label>
        <div class="radio-inline">
          <div class="radio-item"><input type="radio" name="mat_second" value="租借" id="ms2a"><label for="ms2a">租借</label></div>
          <div class="radio-item"><input type="radio" name="mat_second" value="媒合" id="ms2b"><label for="ms2b">媒合</label></div>
        </div>
      </div>
      <div class="field"><input type="text" id="mat_source_other_text" placeholder="其他來源說明"></div>
    </div>
  </div>

  <div class="row">
    <div class="field"><label class="field-label">已使用約(年)</label><input type="text" inputmode="decimal" id="mat_years" placeholder="年"></div>
    <div class="field" style="display:flex;align-items:end"><div class="check-item"><input type="checkbox" name="mat_years_unknown" id="myu" value="使用年限不明"><label for="myu">年限不明</label></div></div>
  </div>

  <div class="field"><label class="field-label">床墊使用情形</label>
    <div class="radio-inline">
      <div class="radio-item"><input type="radio" name="mat_status" value="已損壞不堪修復，需更新" id="mst1"><label for="mst1">損壞需更新</label></div>
      <div class="radio-item"><input type="radio" name="mat_status" value="規格或功能不符使用者現在的需求，需更換" id="mst2"><label for="mst2">規格不符</label></div>
      <div class="radio-item"><input type="radio" name="mat_status" value="適合繼續使用，但需要另行購置於不同場所使用" id="mst3"><label for="mst3">另購不同場所</label></div>
      <div class="radio-item"><input type="radio" name="mat_status" value="適合繼續使用，無需更換" id="mst4"><label for="mst4">無需更換</label></div>
    </div>
    <div class="field" style="margin-top:8px"><input type="text" id="mat_status_other" placeholder="其他使用情形"></div>
  </div>

  <hr class="divider">
  <div class="sub-label">床架</div>
  <div class="field"><label class="field-label">輔具種類</label>
    <div class="radio-inline">
      <div class="radio-item"><input type="radio" name="frame_type" value="和式地板(無床架)" id="frt1"><label for="frt1">和式地板</label></div>
      <div class="radio-item"><input type="radio" name="frame_type" value="一般市售床" id="frt2"><label for="frt2">一般市售床</label></div>
      <div class="radio-item"><input type="radio" name="frame_type" value="手動居家用照顧床" id="frt3"><label for="frt3">手動照顧床</label></div>
      <div class="radio-item"><input type="radio" name="frame_type" value="電動居家用照顧床" id="frt4"><label for="frt4">電動照顧床</label></div>
    </div>
    <div class="field" style="margin-top:8px"><input type="text" id="frame_type_other" placeholder="其他床架種類"></div>
  </div>

  <div class="field"><label class="field-label">輔具來源</label>
    <div class="radio-inline">
      <div class="radio-item"><input type="radio" name="frame_source" value="政府補助" id="fsrc1"><label for="fsrc1">政府補助</label></div>
      <div class="radio-item"><input type="radio" name="frame_source" value="二手輔具" id="fsrc2"><label for="fsrc2">二手輔具</label></div>
      <div class="radio-item"><input type="radio" name="frame_source" value="自購" id="fsrc3"><label for="fsrc3">自購</label></div>
      <div class="radio-item"><input type="radio" name="frame_source" value="其他" id="fsrc4"><label for="fsrc4">其他</label></div>
    </div>
    <div id="frameSourceDetail" class="cond-block">
      <div class="field"><label class="field-label">政府補助類型（可複選）</label>
        <div class="check-grid">
          <div class="check-item"><input type="checkbox" name="frm_gov_disability" id="fgd" value="身障"><label for="fgd">身障</label></div>
          <div class="check-item"><input type="checkbox" name="frm_gov_ltc" id="fgl" value="長照"><label for="fgl">長照</label></div>
          <div class="check-item"><input type="checkbox" name="frm_gov_work" id="fgw" value="職災"><label for="fgw">職災</label></div>
          <div class="check-item"><input type="checkbox" name="frm_gov_rehab" id="fgr" value="職再"><label for="fgr">職再</label></div>
          <div class="check-item"><input type="checkbox" name="frm_gov_edu" id="fge" value="教育"><label for="fge">教育</label></div>
          <div class="check-item"><input type="checkbox" name="frm_gov_vet" id="fgv" value="榮民"><label for="fgv">榮民</label></div>
          <div class="check-item"><input type="checkbox" name="frm_gov_nhi" id="fgn" value="健保"><label for="fgn">健保</label></div>
        </div>
        <div class="field" style="margin-top:8px"><input type="text" id="frm_gov_other" placeholder="其他補助來源"></div>
      </div>
      <div class="field"><label class="field-label">二手輔具方式</label>
        <div class="radio-inline">
          <div class="radio-item"><input type="radio" name="frm_second" value="租借" id="fs2a"><label for="fs2a">租借</label></div>
          <div class="radio-item"><input type="radio" name="frm_second" value="媒合" id="fs2b"><label for="fs2b">媒合</label></div>
        </div>
      </div>
      <div class="field"><input type="text" id="frm_source_other_text" placeholder="其他來源說明"></div>
    </div>
  </div>

  <div class="row">
    <div class="field"><label class="field-label">已使用約(年)</label><input type="text" inputmode="decimal" id="frame_years" placeholder="年"></div>
    <div class="field" style="display:flex;align-items:end"><div class="check-item"><input type="checkbox" name="frame_years_unknown" id="fyu" value="使用年限不明"><label for="fyu">年限不明</label></div></div>
  </div>

  <div class="field"><label class="field-label">床架使用情形</label>
    <div class="radio-inline">
      <div class="radio-item"><input type="radio" name="frame_status" value="已損壞不堪修復，需更新" id="frst1"><label for="frst1">損壞需更新</label></div>
      <div class="radio-item"><input type="radio" name="frame_status" value="規格或功能不符使用者現在的需求，需更換" id="frst2"><label for="frst2">規格不符</label></div>
      <div class="radio-item"><input type="radio" name="frame_status" value="適合繼續使用，但需要另行購置於不同場所使用" id="frst3"><label for="frst3">另購不同場所</label></div>
      <div class="radio-item"><input type="radio" name="frame_status" value="適合繼續使用，無需更換" id="frst4"><label for="frst4">無需更換</label></div>
    </div>
    <div class="field" style="margin-top:8px"><input type="text" id="frame_status_other" placeholder="其他使用情形"></div>
  </div>
</div></div>

<!-- S3: 身體評估 -->
<div class="section"><div class="section-header collapsed" onclick="toggleSection(this)"><div class="num">3</div><div class="title">身體功能評估</div><div class="chevron">›</div></div>
<div class="section-body hidden">
  <div class="sub-label">診斷</div>
  <div class="check-grid" id="dxGrid17"></div>
  <div class="row" style="margin-top:8px">
    <div class="field"><input type="text" id="dx_stroke_side" placeholder="中風偏癱(左/右)"></div>
    <div class="field"><input type="text" id="dx_sci_level" placeholder="脊損位(頸/胸/腰/薦)"></div>
  </div>
  <div class="field"><input type="text" id="dx_tbi_side" placeholder="腦外傷(左/右)"></div>
  <div class="field"><input type="text" id="dx_other_text" placeholder="其他診斷"></div>

  <hr class="divider">
  <div id="assessGrid"></div>

  <div id="romDetail" class="cond-block">
    <div class="field"><label class="field-label">受限關節（可複選）</label>
      <div class="check-grid">
        <div class="check-item"><input type="checkbox" name="rom_hip" id="romhip" value="髖關節"><label for="romhip">髖關節</label></div>
        <div class="check-item"><input type="checkbox" name="rom_knee" id="romknee" value="膝關節"><label for="romknee">膝關節</label></div>
      </div>
      <div class="field" style="margin-top:8px"><input type="text" id="rom_other_joint" placeholder="其他關節"></div>
    </div>
  </div>

  <div id="sitBalDetail" class="cond-block">
    <div class="field"><label class="field-label">身體明顯倒向（可複選）</label>
      <div class="check-grid">
        <div class="check-item"><input type="checkbox" name="sitbal_left" id="sbl" value="左側"><label for="sbl">左側</label></div>
        <div class="check-item"><input type="checkbox" name="sitbal_right" id="sbr" value="右側"><label for="sbr">右側</label></div>
        <div class="check-item"><input type="checkbox" name="sitbal_front" id="sbf" value="前方"><label for="sbf">前方</label></div>
        <div class="check-item"><input type="checkbox" name="sitbal_back" id="sbb" value="後方"><label for="sbb">後方</label></div>
      </div>
    </div>
  </div>

  <div id="dynBalDetail" class="cond-block">
    <div class="field"><label class="field-label">重心移動易失衡方向（可複選）</label>
      <div class="check-grid">
        <div class="check-item"><input type="checkbox" name="dynbal_left" id="dbl" value="左側"><label for="dbl">左側</label></div>
        <div class="check-item"><input type="checkbox" name="dynbal_right" id="dbr" value="右側"><label for="dbr">右側</label></div>
        <div class="check-item"><input type="checkbox" name="dynbal_front" id="dbf" value="前方"><label for="dbf">前方</label></div>
        <div class="check-item"><input type="checkbox" name="dynbal_back" id="dbb" value="後方"><label for="dbb">後方</label></div>
      </div>
    </div>
  </div>

  <div class="sub-label">床面相關身體及空間量測</div>
  <div class="row">
    <div class="field"><label class="field-label">個案身高(cm)</label><input type="text" inputmode="decimal" id="f_height"></div>
    <div class="field"><label class="field-label">體重(kg)</label><input type="text" inputmode="decimal" id="f_weight"></div>
  </div>
  <div class="row">
    <div class="field"><label class="field-label">膝窩高(cm)</label><input type="text" inputmode="decimal" id="knee_h"></div>
    <div class="field"><label class="field-label">肩寬(cm)</label><input type="text" inputmode="decimal" id="shoulder_w"></div>
  </div>
  <div class="row">
    <div class="field"><label class="field-label">照顧者身高(cm)</label><input type="text" inputmode="decimal" id="carer_h"></div>
    <div class="field"><label class="field-label">適合照顧高度(cm)</label><input type="text" inputmode="decimal" id="care_h"></div>
  </div>

  <div class="field" style="margin-top:12px">

(function(){
  const dx=[['dx_veg','植物人'],['dx_dementia','失智症'],['dx_stroke','中風偏癱'],['dx_sci','脊髓損傷'],['dx_tbi','腦外傷'],['dx_cerebellar','小腦萎縮症'],['dx_cp','腦性麻痺'],['dx_delay','發展遲緩'],['dx_mnd','運動神經元疾病'],['dx_parkinson','巴金森氏症'],['dx_muscular','肌肉萎縮症'],['dx_polio','小兒麻痺'],['dx_fracture','骨折'],['dx_amputation','截肢'],['dx_arthritis','關節炎']];

(function(){
  const items=[
    ['consciousness','意識狀態',['正常','嗜睡','錯亂或混亂','無明顯反應']],
    ['mental','心智功能',['正常','有精神/行為問題']],
    ['skin_sense','皮膚感覺',['正常','異常','喪失','無法施測']],
    ['hypotension','姿勢性低血壓',['有','無','未施測']],
    ['stamina','目前體力狀態',['良好','尚可','不佳']],
    ['stamina_prog','體力可能進展',['維持','進步','退化']],
    ['rom','關節活動度',['正常','受限制']],
    ['ctrl_remote','控制器操作能力',['獨立操作','需照顧者部分協助','照顧者協助操作']],
    ['ctrl_rail','護欄操作能力',['獨立操作','需照顧者部分協助','照顧者協助操作']],
    ['turn_l','翻身-翻至左側',['可獨立輕易完成','執行費力需協助','完全依賴']],
    ['turn_r','翻身-翻至右側',['可獨立輕易完成','執行費力需協助','完全依賴']],
    ['sit_up','坐起能力',['可獨立輕易完成','執行費力需協助','完全依賴']],
    ['sit_bal','靜態坐姿平衡',['良好','雙手扶持尚可','雙手扶持難以']],
    ['dyn_bal','動態坐姿平衡',['良好','尚可','不佳']],
    ['transfer_ability','轉位能力',['可獨立輕易完成','執行費力需協助','完全依賴']],
  ];
  const c=document.getElementById('assessGrid');
  items.forEach(([id,label,opts])=>{
    let extra='';
    if(id==='consciousness') extra='<div class="field" style="margin-top:6px"><input type="text" id="consciousness_other" placeholder="其他意識狀態"></div>';
    if(id==='mental') extra='<div class="field" style="margin-top:6px"><input type="text" id="mental_other" placeholder="其他心智功能"></div>';
    if(id==='skin_sense') extra='<div class="field" style="margin-top:6px"><input type="text" id="skin_sense_detail" placeholder="異常/喪失/無法施測說明"></div>';
    c.innerHTML+=`<div class="field"><label class="field-label">${label}</label><div class="radio-inline">${opts.map((o,i)=>`<div class="radio-item"><input type="radio" name="${id}" value="${o}" id="${id}_${i}"><label for="${id}_${i}">${o}</label></div>`).join('')}</div>${extra}</div>`;
  });
})();

(function(){
  const items=[['risk_diabetes','糖尿病'],['risk_inconti','失禁'],['risk_skin_dirty','皮膚清潔不佳'],['risk_moist','皮膚經常潮濕'],['risk_malnutri','營養不良'],['risk_thin','骨突處軟組織不足'],['risk_bone','異常骨突'],['risk_vascular','周邊血管病變'],['risk_infection','皮膚感染'],['risk_friction','經常性摩擦'],['risk_sense_loss','皮膚感覺異常或喪失'],['risk_no_relieve','無法自行執行減壓活動']];
  const c=document.getElementById('riskGrid');
  items.forEach(([id,l])=>{c.innerHTML+=`<div class="check-item"><input type="checkbox" name="${id}" id="${id}" value="${l}"><label for="${id}">${l}</label></div>`;});
  c.innerHTML+='<div class="field" style="width:100%;margin-top:8px"><input type="text" id="risk_other" placeholder="其他危險因子"></div>';
})();

// Conditional toggles
document.querySelectorAll('input[name="exempt"]').forEach(r=>r.addEventListener('change',function(){document.getElementById('exemptDetail').style.display=this.value==='需要'?'block':'none';}));
document.querySelectorAll('input[name="mat_source"]').forEach(r=>r.addEventListener('change',function(){document.getElementById('matSourceDetail').classList.toggle('show',true);}));
document.querySelectorAll('input[name="frame_source"]').forEach(r=>r.addEventListener('change',function(){document.getElementById('frameSourceDetail').classList.toggle('show',true);}));

document.addEventListener('change',function(e){
  if(e.target.name==='rom') document.getElementById('romDetail').classList.toggle('show',e.target.value==='受限制');
  if(e.target.name==='sit_bal') document.getElementById('sitBalDetail').classList.toggle('show',e.target.value!=='良好');
  if(e.target.name==='dyn_bal') document.getElementById('dynBalDetail').classList.toggle('show',e.target.value!=='良好');
  if(e.target.name==='sore') document.getElementById('soreDetail').classList.toggle('show',e.target.value!=='未發生');
  if(e.target.name==='bed_size') document.getElementById('customSizeDetail').classList.toggle('show',e.target.value==='特製尺寸');
  if(e.target.name==='air_type') document.getElementById('advancedAirDetail').classList.toggle('show',e.target.value==='進階型');
});
document.getElementById('space_lim').addEventListener('change',function(){document.getElementById('spaceDetail').classList.toggle('show',this.checked);});

function updateProgress(){const n=document.querySelectorAll('input[type="radio"]:checked,input[type="checkbox"]:checked').length;const f=Array.from(document.querySelectorAll('input[type="text"],textarea')).filter(el=>el.value.trim()).length;document.getElementById('progressFill').style.width=Math.min(100,Math.round((n+f)/40*100))+'%';}
document.addEventListener('change',updateProgress);document.addEventListener('input',updateProgress);

function collectData(){const d={};document.querySelectorAll('input[type="text"],textarea').forEach(el=>{if(el.id&&el.value.trim())d[el.id]=el.value.trim();});document.querySelectorAll('input[type="radio"]:checked').forEach(el=>{d[el.name]=el.value;});const c={};document.querySelectorAll('input[type="checkbox"]:checked').forEach(el=>{const k=el.name||el.id;if(!c[k])c[k]=[];c[k].push(el.value);});d._checks=c;d._timestamp=new Date().toISOString();d._report='編號17-照顧床';return d;}
function saveLocal(){localStorage.setItem('form17_draft',JSON.stringify(collectData()));showToast('已暫存');}
function exportJSON(){const d=collectData();const j=JSON.stringify(d,null,2);try{const b=new Blob([j],{type:'application/json'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=`17_照顧床_${d.f_evaluator||'草稿'}_${new Date().toISOString().slice(0,10)}.json`;a.click();URL.revokeObjectURL(u);}catch(e){}copyJSON();}
function copyJSON(){const j=JSON.stringify(collectData(),null,2);showCopyModal(j);}
function fallbackCopy(t){const ta=document.createElement('textarea');ta.value=t;ta.style.cssText='position:fixed;left:-9999px';document.body.appendChild(ta);ta.focus();ta.select();try{document.execCommand('copy');showToast('已複製');}catch(e){const o=document.createElement('div');o.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px';o.innerHTML=`<div style="background:#fff;border-radius:12px;padding:16px;width:100%;max-height:70vh;display:flex;flex-direction:column;gap:12px"><div style="font-weight:600">長按全選→複製</div><textarea readonly style="flex:1;min-height:200px;font-size:12px;font-family:monospace;border:1px solid #ddd;border-radius:8px;padding:8px">${t.split('<').join('&lt;')}</textarea><button onclick="this.closest('div[style*=fixed]').remove()" style="padding:10px;background:var(--brand);color:#fff;border:none;border-radius:8px">關閉</button></div>`;document.body.appendChild(o);}document.body.removeChild(ta);}
function showCopyModal(text){const o=document.createElement('div');o.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px';const b=document.createElement('div');b.style.cssText='background:#fff;border-radius:12px;padding:16px;width:100%;max-height:70vh;display:flex;flex-direction:column;gap:12px';b.innerHTML=`<div style="font-weight:600;font-size:15px">長按下方文字 → 全選 → 複製</div><textarea readonly style="flex:1;min-height:200px;font-size:12px;font-family:monospace;border:1px solid #ddd;border-radius:8px;padding:8px">${text.split('<').join('&lt;')}</textarea><button onclick="this.closest('div[style*=fixed]').remove()" style="padding:10px;background:var(--brand);color:#fff;border:none;border-radius:8px;font-size:15px">關閉</button>`;o.appendChild(b);document.body.appendChild(o);b.querySelector('textarea').focus();b.querySelector('textarea').select();}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}
window.addEventListener('load',function(){updateProgress();if(!document.getElementById('f_eval_date').value){const d=new Date();document.getElementById('f_eval_date').value=d.getFullYear()+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+String(d.getDate()).padStart(2,'0');}});
</script>
